version: '3'

env:
  ANSIBLE_HOME: '{{.TASKFILE_DIR}}/ansible/.ansible'

tasks:
  infra:init:
    desc: Initialize OpenTofu for Proxmox
    dir: terraform/proxmox
    cmd: tofu init

  infra:plan:
    desc: Preview Proxmox infrastructure changes
    dir: terraform/proxmox
    cmd: tofu plan

  infra:apply:
    desc: Apply Proxmox infrastructure changes
    dir: terraform/proxmox
    cmd: tofu apply

  infra:talos-iso:
    desc: Download Talos ISO onto shared Proxmox ISO storage
    dir: ansible
    cmd: ansible latios -m get_url -a 'url=https://github.com/siderolabs/talos/releases/download/v1.12.6/metal-amd64.iso dest=/mnt/pve/nfs-isos/template/iso/talos-1.12.6-metal-amd64.iso mode=0644 timeout=1800'

  infra:lxc-template:
    desc: Download Debian 13 LXC template onto rayquaza local storage
    dir: ansible
    cmd: ansible rayquaza -m command -a 'pveam download local debian-13-standard_13.1-2_amd64.tar.zst'

  network:init:
    desc: Initialize OpenTofu for Unifi
    dir: terraform/unifi
    cmd: tofu init

  network:plan:
    desc: Preview Unifi network changes
    dir: terraform/unifi
    cmd: tofu plan -parallelism=1 -out=tfplan

  network:apply:
    desc: Apply Unifi network changes
    dir: terraform/unifi
    cmd: tofu apply -parallelism=1 tfplan

  ansible:collections:
    desc: Install Ansible collections
    dir: ansible
    cmd: ansible-galaxy collection install -r collections/requirements.yml

  ansible:proxmox:
    desc: Configure Proxmox hosts
    dir: ansible
    cmd: ansible-playbook playbooks/proxmox-setup.yml

  ansible:postgresql:
    desc: Configure PostgreSQL LXC (install, databases, users)
    dir: ansible
    cmd: ansible-playbook playbooks/postgresql-setup.yml

  ansible:truenas:
    desc: Configure TrueNAS datasets and NFS shares
    dir: ansible
    cmd: ansible-playbook playbooks/truenas-setup.yml

  talos:gen-secrets:
    desc: Generate a new Talos secrets bundle for a fresh cluster only
    cmd: |
      test ! -f talos/secrets.yaml || (echo "talos/secrets.yaml already exists; refusing to overwrite cluster identity" && exit 1)
      talosctl gen secrets --output-file talos/secrets.yaml

  talos:gen-config:
    desc: Generate Talos machine configs and talosconfig from the existing secrets bundle
    cmd: |
      test -f talos/secrets.yaml || (echo "talos/secrets.yaml is required. Restore the live cluster secrets first, or run task talos:gen-secrets only for a brand-new cluster." && exit 1)
      mkdir -p talos/generated
      talosctl gen config homelab https://10.0.10.11:6443 \
        --output talos/generated \
        --force \
        --talos-version v1.12.6 \
        --kubernetes-version 1.35.2 \
        --install-disk /dev/sda \
        --install-image ghcr.io/siderolabs/installer:v1.12.6 \
        --with-secrets talos/secrets.yaml \
        --config-patch @talos/patches/common.yaml
      cp talos/generated/talosconfig talos/talosconfig

  talos:apply-control-plane:
    desc: Apply Talos control-plane config (HOST=articuno NODE=maintenance-or-static-ip)
    cmd: |
      HOST="{{default "" .HOST}}"
      test -n "$HOST" || (echo "HOST is required: articuno, zapdos, or moltres" && exit 1)
      NODE="{{default "" .NODE}}"
      if [ -z "$NODE" ]; then
        case "$HOST" in
          articuno) NODE="10.0.10.11" ;;
          zapdos) NODE="10.0.10.12" ;;
          moltres) NODE="10.0.10.13" ;;
          *) echo "Unknown control-plane HOST=$HOST" && exit 1 ;;
        esac
      fi
      talosctl apply-config --insecure \
        --nodes "$NODE" \
        --file talos/generated/controlplane.yaml \
        --config-patch @talos/patches/nodes/$HOST.yaml

  talos:apply-worker:
    desc: Apply Talos worker config (HOST=lugia NODE=maintenance-or-static-ip)
    cmd: |
      HOST="{{default "" .HOST}}"
      test -n "$HOST" || (echo "HOST is required: lugia or ho-oh" && exit 1)
      NODE="{{default "" .NODE}}"
      if [ -z "$NODE" ]; then
        case "$HOST" in
          lugia) NODE="10.0.10.14" ;;
          ho-oh) NODE="10.0.10.15" ;;
          *) echo "Unknown worker HOST=$HOST" && exit 1 ;;
        esac
      fi
      talosctl apply-config --insecure \
        --nodes "$NODE" \
        --file talos/generated/worker.yaml \
        --config-patch @talos/patches/nodes/$HOST.yaml

  talos:bootstrap:
    desc: Bootstrap the Talos Kubernetes control plane
    cmd: talosctl --talosconfig talos/talosconfig --nodes 10.0.10.11 --endpoints 10.0.10.11 bootstrap

  talos:kubeconfig:
    desc: Fetch Kubernetes kubeconfig from Talos
    cmd: talosctl --talosconfig talos/talosconfig --nodes 10.0.10.11 --endpoints 10.0.10.11 kubeconfig talos/kubeconfig

  talos:health:
    desc: Check Talos cluster health
    cmd: talosctl --talosconfig talos/talosconfig --nodes 10.0.10.11 --endpoints 10.0.10.11 health --control-plane-nodes 10.0.10.11,10.0.10.12,10.0.10.13 --worker-nodes 10.0.10.14,10.0.10.15

  flux:bootstrap:
    desc: Bootstrap Flux CD onto the cluster
    cmd: |
      flux --kubeconfig talos/kubeconfig bootstrap github \
        --owner=${GITHUB_USER} \
        --repository=homelab \
        --branch=${GITHUB_BRANCH:-main} \
        --path=kubernetes \
        --personal \
        --private=false

  flux:check:
    desc: Check Flux sync status
    cmd: flux --kubeconfig talos/kubeconfig get all --all-namespaces
