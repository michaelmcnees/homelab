apiVersion: batch/v1
kind: Job
metadata:
  name: invoice-ninja-migrate
  namespace: hdf
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z metagross.internal.svc.cluster.local 5432; do sleep 3; done
              until nc -z redis-master.databases.svc.cluster.local 6379; do sleep 3; done
      containers:
        - name: migrate
          image: invoiceninja/invoiceninja-debian:5
          imagePullPolicy: IfNotPresent
          command:
            - php
            - artisan
            - migrate
            - --force
          envFrom:
            - configMapRef:
                name: invoice-ninja-config
            - secretRef:
                name: invoice-ninja-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
