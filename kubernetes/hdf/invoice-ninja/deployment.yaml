apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-ninja
  namespace: hdf
  labels:
    app.kubernetes.io/name: invoice-ninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invoice-ninja
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invoice-ninja
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1500
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z mariadb.internal.svc.cluster.local 3306; do sleep 3; done
              until nc -z redis-master.databases.svc.cluster.local 6379; do sleep 3; done
              until nc -z rustfs.object-storage.svc.cluster.local 9000; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: invoice-ninja
          image: invoiceninja/invoiceninja-debian:5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: invoice-ninja-config
            - secretRef:
                name: invoice-ninja-secrets
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
