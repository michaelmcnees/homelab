apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-ninja
  namespace: hdf
  labels:
    app.kubernetes.io/name: invoice-ninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invoice-ninja
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invoice-ninja
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1500
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z registeel.internal.svc.cluster.local 3306; do sleep 3; done
              until nc -z rustfs.object-storage.svc.cluster.local 9000; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: invoice-ninja
          image: invoiceninja/invoiceninja-debian:5
          imagePullPolicy: IfNotPresent
          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: invoice-ninja-config
            - secretRef:
                name: invoice-ninja-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: public
              mountPath: /var/www/html/public
            - name: storage
              mountPath: /var/www/html/storage
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: public
              mountPath: /var/www/html/public
              readOnly: true
            - name: storage
              mountPath: /var/www/html/storage
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: invoice-ninja-nginx
        - name: public
          persistentVolumeClaim:
            claimName: invoice-ninja-public
        - name: storage
          persistentVolumeClaim:
            claimName: invoice-ninja-storage
