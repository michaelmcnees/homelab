apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: invoice-ninja
  namespace: hdf
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`portal.mcnees.me`)
      kind: Rule
      middlewares:
        - name: public-chain
          namespace: infrastructure
      services:
        - name: invoice-ninja
          port: 80
  tls:
    secretName: invoice-ninja-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: invoice-ninja
  namespace: hdf
spec:
  secretName: invoice-ninja-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - portal.mcnees.me
