apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-web
  namespace: hdf
  labels:
    app.kubernetes.io/name: chatwoot
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatwoot
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatwoot
        app.kubernetes.io/component: web
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z metagross.internal.svc.cluster.local 5432; do sleep 3; done
              until nc -z redis-master.databases.svc.cluster.local 6379; do sleep 3; done
              until nc -z rustfs.object-storage.svc.cluster.local 9000; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: chatwoot
          image: chatwoot/chatwoot:v4.10.1
          imagePullPolicy: IfNotPresent
          command:
            - bundle
            - exec
            - rails
            - s
            - -p
            - "3000"
            - -b
            - 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chatwoot-config
            - secretRef:
                name: chatwoot-secrets
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
