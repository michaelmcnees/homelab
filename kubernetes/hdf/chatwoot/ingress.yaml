apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: chatwoot
  namespace: hdf
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`support.hudsonvilledigital.com`)
      kind: Rule
      middlewares:
        - name: public-chain
          namespace: infrastructure
      services:
        - name: chatwoot
          port: 3000
  tls:
    secretName: chatwoot-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: chatwoot
  namespace: hdf
spec:
  secretName: chatwoot-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - support.hudsonvilledigital.com
