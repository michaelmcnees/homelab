apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-worker
  namespace: hdf
  labels:
    app.kubernetes.io/name: chatwoot
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatwoot
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatwoot
        app.kubernetes.io/component: worker
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z metagross.internal.svc.cluster.local 5432; do sleep 3; done
              until nc -z redis-master.databases.svc.cluster.local 6379; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: sidekiq
          image: chatwoot/chatwoot:v4.10.1
          imagePullPolicy: IfNotPresent
          command:
            - bundle
            - exec
            - sidekiq
            - -C
            - config/sidekiq.yml
          envFrom:
            - configMapRef:
                name: chatwoot-config
            - secretRef:
                name: chatwoot-secrets
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
