apiVersion: batch/v1
kind: Job
metadata:
  name: chatwoot-prepare
  namespace: hdf
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              until nc -z metagross.internal.svc.cluster.local 5432; do sleep 3; done
              until nc -z redis-master.databases.svc.cluster.local 6379; do sleep 3; done
      containers:
        - name: prepare
          image: chatwoot/chatwoot:v4.10.1
          imagePullPolicy: IfNotPresent
          command:
            - bundle
            - exec
            - rails
            - db:chatwoot_prepare
          envFrom:
            - configMapRef:
                name: chatwoot-config
            - secretRef:
                name: chatwoot-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
