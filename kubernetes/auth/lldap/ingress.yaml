apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lldap
  namespace: auth
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lldap.home.mcnees.me`)
      kind: Rule
      services:
        - name: lldap
          port: 17170
  tls:
    secretName: lldap-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lldap
  namespace: auth
spec:
  secretName: lldap-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - lldap.home.mcnees.me
