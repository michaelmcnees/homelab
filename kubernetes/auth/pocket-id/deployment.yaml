apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: auth
  labels:
    app.kubernetes.io/name: pocket-id
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pocket-id
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pocket-id
    spec:
      enableServiceLinks: false
      priorityClassName: critical
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 1411
              protocol: TCP
          env:
            - name: APP_URL
              value: https://id.mcnees.me
            - name: TRUST_PROXY
              value: "true"
            - name: FILE_BACKEND
              value: database
            - name: ANALYTICS_DISABLED
              value: "true"
            - name: VERSION_CHECK_DISABLED
              value: "true"
            - name: UI_CONFIG_DISABLED
              value: "true"
            - name: LDAP_ENABLED
              value: "true"
            - name: LDAP_URL
              value: ldap://lldap.auth.svc.cluster.local:389
            - name: LDAP_BIND_DN
              value: uid=admin,ou=people,dc=mcnees,dc=me
            - name: LDAP_BASE
              value: dc=mcnees,dc=me
            - name: LDAP_USER_SEARCH_FILTER
              value: (objectClass=person)
            - name: LDAP_USER_GROUP_SEARCH_FILTER
              value: (objectClass=groupOfUniqueNames)
            - name: LDAP_SOFT_DELETE_USERS
              value: "true"
            - name: LDAP_ATTRIBUTE_USER_UNIQUE_IDENTIFIER
              value: uuid
            - name: LDAP_ATTRIBUTE_USER_USERNAME
              value: uid
            - name: LDAP_ATTRIBUTE_USER_EMAIL
              value: mail
            - name: LDAP_ATTRIBUTE_USER_FIRST_NAME
              value: givenName
            - name: LDAP_ATTRIBUTE_USER_LAST_NAME
              value: sn
            - name: LDAP_ATTRIBUTE_GROUP_MEMBER
              value: member
            - name: LDAP_ATTRIBUTE_GROUP_UNIQUE_IDENTIFIER
              value: uuid
            - name: LDAP_ATTRIBUTE_GROUP_NAME
              value: cn
            - name: LDAP_ADMIN_GROUP_NAME
              value: lldap_admin
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secret
                  key: DB_CONNECTION_STRING
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secret
                  key: ENCRYPTION_KEY
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lldap-secret
                  key: LLDAP_LDAP_USER_PASS
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
