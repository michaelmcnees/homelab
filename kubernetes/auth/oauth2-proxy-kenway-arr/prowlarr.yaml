apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-kenway-prowlarr
  namespace: auth
  labels:
    app.kubernetes.io/name: oauth2-proxy-kenway-prowlarr
    app.kubernetes.io/component: kenway-arr-share
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy-kenway-prowlarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy-kenway-prowlarr
        app.kubernetes.io/component: kenway-arr-share
    spec:
      enableServiceLinks: false
      hostAliases:
        - ip: 10.0.10.200
          hostnames:
            - id.mcnees.me
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url=https://id.mcnees.me
            - --redirect-url=https://kenway-prowlarr.halfbeak-chimaera.ts.net/oauth2/callback
            - --scope=openid profile email groups
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-refresh=1h
            - --cookie-expire=8h
            - --cookie-csrf-per-request=true
            - --cookie-csrf-per-request-limit=8
            - --email-domain=*
            - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails.txt
            - --whitelist-domain=.halfbeak-chimaera.ts.net
            - --upstream=http://prowlarr.media.svc.cluster.local:9696
            - --reverse-proxy=true
            - --trusted-proxy-ip=10.244.0.0/16
            - --pass-access-token=true
            - --pass-user-headers=true
            - --skip-provider-button=true
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: OAUTH2_PROXY_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: OAUTH2_PROXY_COOKIE_SECRET
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: allowed-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: allowed-emails
          configMap:
            name: oauth2-proxy-kenway-arr
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-kenway-prowlarr
  namespace: auth
  labels:
    app.kubernetes.io/name: oauth2-proxy-kenway-prowlarr
    app.kubernetes.io/component: kenway-arr-share
spec:
  selector:
    app.kubernetes.io/name: oauth2-proxy-kenway-prowlarr
  ports:
    - name: http
      port: 4180
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kenway-prowlarr
  namespace: auth
  annotations:
    tailscale.com/tags: tag:homelab-shared-service
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: oauth2-proxy-kenway-prowlarr
      port:
        number: 4180
  tls:
    - hosts:
        - kenway-prowlarr
