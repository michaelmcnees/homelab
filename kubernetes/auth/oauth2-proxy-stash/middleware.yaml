apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-stash
  namespace: auth
spec:
  chain:
    middlewares:
      - name: oauth2-proxy-stash-errors
      - name: oauth2-proxy-stash-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-stash-auth
  namespace: auth
spec:
  forwardAuth:
    address: http://oauth2-proxy-stash.auth.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - X-Auth-Request-Preferred-Username
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy-stash
  namespace: auth
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`stash.home.mcnees.me`) && PathPrefix(`/oauth2`)
      kind: Rule
      priority: 1000
      services:
        - name: oauth2-proxy-stash
          port: 4180
  tls:
    secretName: legacy-home-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-stash-errors
  namespace: auth
spec:
  errors:
    status:
      - "401-403"
    service:
      name: oauth2-proxy-stash
      port: 4180
    query: /oauth2/sign_in?rd={url}
    statusRewrites:
      "401": 302
      "403": 302
