apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backups
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/backups
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure
    - name: apps
    - name: media
  decryption:
    provider: sops
    secretRef:
      name: sops-age
