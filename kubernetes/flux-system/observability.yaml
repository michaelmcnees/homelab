apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/observability
  prune: true
  wait: false
  dependsOn:
    - name: infrastructure-configs
  decryption:
    provider: sops
    secretRef:
      name: sops-age
