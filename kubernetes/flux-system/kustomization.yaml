apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- apps.yaml
- auth.yaml
- backups.yaml
- databases.yaml
- gotk-components.yaml
- gotk-sync.yaml
- hdf.yaml
- infrastructure-configs.yaml
- infrastructure.yaml
- media.yaml
- observability.yaml
- smart-home.yaml
- storage.yaml
patches:
- path: patches/sops-decryption.yaml
  target:
    group: kustomize.toolkit.fluxcd.io
    version: v1
    kind: Kustomization
    name: flux-system
    namespace: flux-system
