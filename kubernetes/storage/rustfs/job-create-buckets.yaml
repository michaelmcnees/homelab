apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-buckets
  namespace: storage
spec:
  backoffLimit: 12
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set rustfs http://rustfs.storage.svc.cluster.local:9000 "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY"; do
                sleep 5
              done
              mc mb --ignore-existing rustfs/invoice-ninja
              mc mb --ignore-existing rustfs/chatwoot
          envFrom:
            - secretRef:
                name: rustfs-secrets
