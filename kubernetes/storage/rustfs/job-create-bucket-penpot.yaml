apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-bucket-penpot
  namespace: object-storage
spec:
  backoffLimit: 12
  ttlSecondsAfterFinished: 604800
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set rustfs http://rustfs.object-storage.svc.cluster.local:9000 "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY"; do
                sleep 5
              done
              mc mb --ignore-existing rustfs/penpot
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - secretRef:
                name: rustfs-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
