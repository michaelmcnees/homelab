apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: object-storage
  labels:
    app.kubernetes.io/name: rustfs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
