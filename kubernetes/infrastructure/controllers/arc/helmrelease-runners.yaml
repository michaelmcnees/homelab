apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homelab-runner
  namespace: arc-runners
spec:
  driftDetection:
    mode: enabled
  interval: 30m
  dependsOn:
    - name: arc-controller
      namespace: arc-system
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    githubConfigUrl: https://github.com/michaelmcnees/homelab
    githubConfigSecret: arc-github-app
    minRunners: 0
    maxRunners: 3
    containerMode:
      type: ""  # plain mode, no dind
