apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  suspend: true
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      version: ">=1.84.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    operatorConfig:
      hostname: homelab-k8s-operator
    apiServerProxyConfig:
      mode: "false"
    proxyConfig:
      defaultTags: "tag:k8s"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
