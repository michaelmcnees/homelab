apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: infrastructure
spec:
  interval: 30m
  dependsOn:
    - name: metallb
      namespace: metallb-system
  chart:
    spec:
      chart: traefik
      version: "39.0.8"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    deployment:
      kind: DaemonSet
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    ingressRoute:
      dashboard:
        enabled: false
    logs:
      general:
        level: INFO
      access:
        enabled: true
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        entryPoint: metrics
        service:
          enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s
          scrapeTimeout: 10s
          additionalLabels:
            release: kube-prometheus-stack
    ports:
      metrics:
        port: 9100
        expose:
          default: false
        exposedPort: 9100
        protocol: TCP
      web:
        port: 8000
        expose:
          default: true
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443
        expose:
          default: true
        exposedPort: 443
        protocol: TCP
      web-external:
        port: 8081
        expose:
          default: true
        exposedPort: 81
        protocol: TCP
      websecure-external:
        port: 8444
        expose:
          default: true
        exposedPort: 444
        protocol: TCP
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    service:
      type: LoadBalancer
      annotations:
        metallb.io/loadBalancerIPs: "10.0.10.200"
