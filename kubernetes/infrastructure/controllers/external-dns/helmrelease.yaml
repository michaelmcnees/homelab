apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 30m
  dependsOn:
    - name: traefik
      namespace: infrastructure
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    domainFilters:
      - mcnees.me
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
    excludeDomains:
      - home.mcnees.me
      - dev.home.mcnees.me
    extraArgs:
      - --cloudflare-dns-records-per-page=5000
      - --traefik-disable-legacy
    interval: 5m
    policy: upsert-only
    provider:
      name: cloudflare
    registry: txt
    sources:
      - traefik-proxy
    txtOwnerId: homelab
    txtPrefix: external-dns-
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
