apiVersion: v1
kind: ConfigMap
metadata:
  name: craft-mcp-proxy
  namespace: toolhive-system
data:
  server.py: |
    import os
    import sys
    import urllib.parse
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    HOP_BY_HOP_HEADERS = {
        "connection",
        "keep-alive",
        "proxy-authenticate",
        "proxy-authorization",
        "te",
        "trailer",
        "transfer-encoding",
        "upgrade",
        "host",
    }

    def upstream_url(path):
        upstream = os.environ.get("CRAFT_MCP_UPSTREAM", "").strip()
        if not upstream:
            raise RuntimeError("CRAFT_MCP_UPSTREAM is required")
        parsed = urllib.parse.urlsplit(upstream)
        if parsed.scheme not in {"http", "https"} or not parsed.netloc:
            raise RuntimeError("CRAFT_MCP_UPSTREAM must be an absolute HTTP(S) URL")
        incoming = urllib.parse.urlsplit(path)
        base = urllib.parse.urlsplit(upstream)
        return urllib.parse.urlunsplit(
            (base.scheme, base.netloc, base.path, incoming.query, "")
        )

    def forward_headers(headers):
        forwarded = {}
        for key, value in headers.items():
            if key.lower() not in HOP_BY_HOP_HEADERS and key.lower() != "authorization":
                forwarded[key] = value
        return forwarded

    def log_proxy_error(path, exc):
        print(f"craft-mcp-proxy request failed for {path}: {exc.__class__.__name__}", file=sys.stderr, flush=True)

    class Handler(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"

        def do_GET(self):
            self.proxy()

        def do_POST(self):
            self.proxy()

        def proxy(self):
            try:
                length = int(self.headers.get("Content-Length", "0") or "0")
                body = self.rfile.read(length) if length else None
                request = urllib.request.Request(
                    upstream_url(self.path),
                    data=body,
                    method=self.command,
                    headers=forward_headers(self.headers),
                )
                with urllib.request.urlopen(request, timeout=120) as response:
                    self.send_response(response.status)
                    content_length = None
                    for key, value in response.headers.items():
                        if key.lower() not in HOP_BY_HOP_HEADERS:
                            if key.lower() == "content-length":
                                content_length = value
                            self.send_header(key, value)
                    if content_length is None:
                        self.send_header("Connection", "close")
                        self.close_connection = True
                    self.end_headers()
                    read_chunk = getattr(response, "read1", response.read)
                    while True:
                        chunk = read_chunk(65536)
                        if not chunk:
                            break
                        self.wfile.write(chunk)
                        self.wfile.flush()
            except Exception as exc:
                log_proxy_error(self.path, exc)
                body = b"Bad Gateway"
                self.send_response(502)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

        def log_message(self, fmt, *args):
            print(fmt % args, flush=True)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: craft-mcp-proxy
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: craft-mcp-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: craft-mcp-proxy
  template:
    metadata:
      annotations:
        craft-mcp-proxy.mcnees.me/config-revision: initial
      labels:
        app.kubernetes.io/name: craft-mcp-proxy
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: craft-mcp-proxy
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          env:
            - name: CRAFT_MCP_UPSTREAM
              valueFrom:
                secretKeyRef:
                  name: craft-mcp-upstream
                  key: CRAFT_MCP_UPSTREAM
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: craft-mcp-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: craft-mcp-proxy
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: craft-mcp-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: craft-mcp-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
