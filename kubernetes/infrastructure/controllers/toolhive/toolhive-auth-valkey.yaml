apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolhive-auth-valkey
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: toolhive-auth-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: toolhive-auth-valkey
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: toolhive-auth-valkey
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: valkey/valkey:9.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - exec valkey-server --appendonly yes --requirepass "$VALKEY_PASSWORD"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: toolhive-auth-redis
                  key: password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -a "$VALKEY_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -a "$VALKEY_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: toolhive-auth-valkey-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: toolhive-auth-valkey-data
  namespace: toolhive-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: toolhive-auth-valkey
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: toolhive-auth-valkey
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: toolhive-auth-valkey
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
