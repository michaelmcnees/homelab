apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  description: Shared MCP backends for agent access through ToolHive.
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPExternalAuthConfig
metadata:
  name: gmail-google-upstream-token
  namespace: toolhive-system
spec:
  type: upstreamInject
  upstreamInject:
    providerName: google
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServerEntry
metadata:
  name: gmail
  namespace: toolhive-system
spec:
  groupRef:
    name: agent-tools
  remoteUrl: https://gmailmcp.googleapis.com/mcp/v1
  transport: streamable-http
  externalAuthConfigRef:
    name: gmail-google-upstream-token
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  type: inline
  inline:
    issuer: https://toolhive.home.mcnees.me
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  groupRef:
    name: agent-tools
  embeddingServerRef:
    name: agent-tools
  serviceType: ClusterIP
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: agent-tools
      audience: https://toolhive.home.mcnees.me/mcp
      resourceUrl: https://toolhive.home.mcnees.me/mcp
      scopes:
        - openid
        - email
        - profile
        - offline_access
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_{tool}"
    optimizer:
      maxToolsToReturn: 8
  authServerConfig:
    issuer: https://toolhive.home.mcnees.me
    authorizationEndpointBaseUrl: https://toolhive.home.mcnees.me
    primaryUpstreamProvider: google
    baselineClientScopes:
      - openid
      - offline_access
    signingKeySecretRefs:
      - name: gmail-mcp-auth
        key: signing-key.pem
    hmacSecretRefs:
      - name: gmail-mcp-auth
        key: hmac-secret
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 720h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: google
        type: oidc
        oidcConfig:
          issuerUrl: https://accounts.google.com
          clientId: 697355755028-s7k8ca3sasiirkgsj3hvg7r33ueolbof.apps.googleusercontent.com
          clientSecretRef:
            name: gmail-mcp-auth
            key: google-client-secret
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          scopes:
            - openid
            - email
            - profile
            - https://www.googleapis.com/auth/gmail.readonly
            - https://www.googleapis.com/auth/gmail.compose
          additionalAuthorizationParams:
            access_type: offline
            prompt: consent
  outgoingAuth:
    source: discovered
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: EmbeddingServer
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  secretName: agent-tools-tls
  dnsNames:
    - toolhive.home.mcnees.me
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`toolhive.home.mcnees.me`)
      kind: Rule
      services:
        - name: vmcp-agent-tools
          port: 4483
  tls:
    secretName: agent-tools-tls
