apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  type: inline
  inline:
    issuer: https://toolhive.home.mcnees.me
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  groupRef:
    name: agent-tools
  embeddingServerRef:
    name: agent-tools
  serviceType: ClusterIP
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: agent-tools
      audience: https://toolhive.home.mcnees.me/mcp
      resourceUrl: https://toolhive.home.mcnees.me/mcp
      scopes:
        - openid
        - email
        - profile
        - offline_access
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_{tool}"
    optimizer:
      maxToolsToReturn: 8
  authServerConfig:
    issuer: https://toolhive.home.mcnees.me
    authorizationEndpointBaseUrl: https://toolhive.home.mcnees.me
    primaryUpstreamProvider: google
    baselineClientScopes:
      - openid
      - offline_access
    signingKeySecretRefs:
      - name: gmail-mcp-auth
        key: signing-key.pem
    hmacSecretRefs:
      - name: gmail-mcp-auth
        key: hmac-secret
    storage:
      type: redis
      redis:
        addr: toolhive-auth-valkey.toolhive-system.svc.cluster.local:6379
        aclUserConfig:
          passwordSecretRef:
            name: toolhive-auth-redis
            key: password
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 720h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: google
        type: oidc
        oidcConfig:
          issuerUrl: https://accounts.google.com
          clientId: 697355755028-el3khdd8mrvii475gbbfc73ijl3u6tmi.apps.googleusercontent.com
          clientSecretRef:
            name: gmail-mcp-auth
            key: google-client-secret
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          scopes:
            - openid
            - email
            - profile
            - https://www.googleapis.com/auth/gmail.readonly
            - https://www.googleapis.com/auth/gmail.compose
            - https://www.googleapis.com/auth/gmail.modify
            - https://www.googleapis.com/auth/gmail.labels
          additionalAuthorizationParams:
            access_type: offline
      - name: honeydew
        type: oauth2
        oauth2Config:
          authorizationEndpoint: https://api.honeydewdone.app/api/auth/oauth2/authorize
          tokenEndpoint: https://api.honeydewdone.app/api/auth/oauth2/token
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          scopes:
            - openid
            - profile
            - email
            - offline_access
          userInfo:
            endpointUrl: https://api.honeydewdone.app/api/auth/oauth2/userinfo
          dcrConfig:
            discoveryUrl: https://api.honeydewdone.app/.well-known/oauth-authorization-server/api/auth
      - name: linear
        type: oauth2
        oauth2Config:
          authorizationEndpoint: https://mcp.linear.app/authorize
          tokenEndpoint: https://mcp.linear.app/token
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          scopes:
            - read
            - write
          dcrConfig:
            discoveryUrl: https://mcp.linear.app/.well-known/oauth-authorization-server
      - name: outline
        type: oauth2
        oauth2Config:
          authorizationEndpoint: https://docs.mcnees.me/oauth/authorize
          tokenEndpoint: https://docs.mcnees.me/oauth/token
          clientId: izto0734m5xy2xegind3
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          scopes:
            - read
            - write
      - name: homey
        type: oauth2
        oauth2Config:
          authorizationEndpoint: https://mcp.athom.com/oauth2/authorise
          tokenEndpoint: https://mcp.athom.com/oauth2/token
          redirectUri: https://toolhive.home.mcnees.me/oauth/callback
          additionalAuthorizationParams:
            response_mode: form_post
          dcrConfig:
            discoveryUrl: https://mcp.athom.com/.well-known/oauth-authorization-server
  outgoingAuth:
    source: discovered
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: EmbeddingServer
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  secretName: agent-tools-tls
  dnsNames:
    - toolhive.home.mcnees.me
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-tools
  namespace: toolhive-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`toolhive.home.mcnees.me`)
      kind: Rule
      services:
        - name: vmcp-agent-tools
          port: 4483
  tls:
    secretName: agent-tools-tls
