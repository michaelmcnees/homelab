            "description": "Gets Google Drive file metadata.",
            "annotations": {"title": "Gets Drive file metadata.", "readOnlyHint": True, "destructiveHint": False, "idempotentHint": True, "openWorldHint": False},
            "inputSchema": {"type": "object", "properties": {"fileId": {"type": "string"}, "fields": {"type": "string"}}, "required": ["fileId"]},
        },
        {
            "name": "download_drive_file",
            "description": "Downloads a Google Drive file or exports a Google Workspace file.",
            "annotations": {"title": "Downloads a Drive file.", "readOnlyHint": True, "destructiveHint": False, "idempotentHint": True, "openWorldHint": False},
            "inputSchema": {"type": "object", "properties": {"fileId": {"type": "string"}, "exportMimeType": {"type": "string"}}, "required": ["fileId"]},
        },
        {
            "name": "create_drive_file",
            "description": "Creates a Google Drive file with optional text or base64 content.",
            "annotations": {"title": "Creates a Drive file.", "readOnlyHint": False, "destructiveHint": False, "idempotentHint": False, "openWorldHint": True},
            "inputSchema": {"type": "object", "properties": {"name": {"type": "string"}, "mimeType": {"type": "string"}, "parents": {"type": "array", "items": {"type": "string"}}, "content": {"type": "string"}, "contentBase64": {"type": "string"}, "contentMimeType": {"type": "string"}}, "required": ["name"]},
        },
        {
            "name": "update_drive_file",
            "description": "Updates Google Drive file metadata and optionally replaces content.",
            "annotations": {"title": "Updates a Drive file.", "readOnlyHint": False, "destructiveHint": False, "idempotentHint": False, "openWorldHint": True},
            "inputSchema": {"type": "object", "properties": {"fileId": {"type": "string"}, "name": {"type": "string"}, "mimeType": {"type": "string"}, "content": {"type": "string"}, "contentBase64": {"type": "string"}, "contentMimeType": {"type": "string"}}, "required": ["fileId"]},
        },
        {
            "name": "delete_drive_file",
            "description": "Deletes a Google Drive file.",
            "annotations": {"title": "Deletes a Drive file.", "readOnlyHint": False, "destructiveHint": True, "idempotentHint": False, "openWorldHint": False},
            "inputSchema": {"type": "object", "properties": {"fileId": {"type": "string"}}, "required": ["fileId"]},
        },
    ]

    DISPATCH = {
        "list_labels": list_labels,
        "search_threads": search_threads,
        "get_thread": get_thread,
        "create_draft": create_draft,
        "update_draft": update_draft,
        "send_draft": send_draft,
        "delete_draft": delete_draft,
        "archive_message": archive_message,
        "archive_thread": archive_thread,
        "list_calendars": list_calendars,
        "list_calendar_events": list_calendar_events,
        "create_calendar_event": create_calendar_event,
        "update_calendar_event": update_calendar_event,
        "delete_calendar_event": delete_calendar_event,
        "check_calendar_freebusy": check_calendar_freebusy,
        "list_drive_files": list_drive_files,
        "get_drive_file_metadata": get_drive_file_metadata,
        "download_drive_file": download_drive_file,
        "create_drive_file": create_drive_file,
        "update_drive_file": update_drive_file,
        "delete_drive_file": delete_drive_file,
    }

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            length = int(self.headers.get("Content-Length", "0"))
            request = json.loads(self.rfile.read(length).decode() or "{}")
            method = request.get("method")
            request_id = request.get("id")
            try:
                if method == "initialize":
                    json_response(self, 200, mcp_result(request_id, {
                        "protocolVersion": request.get("params", {}).get("protocolVersion", "2025-03-26"),
                        "capabilities": {"tools": {"listChanged": False}},
                        "serverInfo": {"name": "gmail-rest-mcp", "version": "1.0.0"},
                    }))
                    return
                if method == "notifications/initialized":
                    json_response(self, 202, {})
                    return
                if method == "tools/list":
                    json_response(self, 200, mcp_result(request_id, {"tools": TOOLS}))
                    return
                if method == "tools/call":
                    token = bearer(self.headers)
                    if not token:
                        json_response(self, 200, mcp_result(request_id, mcp_error_text("Missing bearer token")))
                        return
                    params = request.get("params", {})
                    name = params.get("name", "")
                    args = params.get("arguments", {}) or {}
                    if name not in DISPATCH:
                        json_response(self, 200, mcp_result(request_id, mcp_error_text("Unknown tool: " + name)))
                        return
                    result = DISPATCH[name](token, args)
                    if result.get("isError"):
                        json_response(self, 200, mcp_result(request_id, result))
                    else:
                        json_response(self, 200, mcp_result(request_id, {"structuredContent": result, "content": [{"type": "text", "text": json.dumps(result)}]}))
                    return
                json_response(self, 404, {"jsonrpc": "2.0", "id": request_id, "error": {"code": -32601, "message": "Method not found"}})
            except Exception as exc:
                json_response(self, 200, mcp_result(request_id, mcp_error_text(str(exc))))

        def log_message(self, fmt, *args):
            print(fmt % args, flush=True)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmail-rest-mcp
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: gmail-rest-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gmail-rest-mcp
  template:
    metadata:
      annotations:
        gmail-rest-mcp.mcnees.me/config-revision: google-workspace-write-tools
      labels:
        app.kubernetes.io/name: gmail-rest-mcp
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gmail-rest-mcp
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: gmail-rest-mcp
---
apiVersion: v1
kind: Service
metadata:
  name: gmail-rest-mcp
  namespace: toolhive-system
  labels:
    app.kubernetes.io/name: gmail-rest-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gmail-rest-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gmail-rest-mcp
  namespace: toolhive-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gmail-rest-mcp.home.mcnees.me`)
      kind: Rule
      services:
        - name: gmail-rest-mcp
          port: 8080
  tls:
    secretName: agent-tools-tls
