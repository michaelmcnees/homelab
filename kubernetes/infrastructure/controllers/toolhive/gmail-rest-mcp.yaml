apiVersion: v1
kind: ConfigMap
metadata:
  name: gmail-rest-mcp
  namespace: toolhive-system
data:
  server.py: |
    import base64
    import json
    import os
    import urllib.parse
    import urllib.request
    from email.message import EmailMessage
    from email.utils import formatdate
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    CALENDAR_API = "https://www.googleapis.com/calendar/v3"
    DRIVE_API = "https://www.googleapis.com/drive/v3"
    DRIVE_UPLOAD_API = "https://www.googleapis.com/upload/drive/v3"
    GMAIL_API = "https://gmail.googleapis.com/gmail/v1/users/me"

    def json_response(handler, status, payload):
        body = json.dumps(payload, separators=(",", ":")).encode()
        handler.send_response(status)
        handler.send_header("Content-Type", "application/json")
        handler.send_header("Content-Length", str(len(body)))
        handler.end_headers()
        handler.wfile.write(body)

    def mcp_result(request_id, result):
        return {"jsonrpc": "2.0", "id": request_id, "result": result}

    def mcp_error_text(text):
        return {
            "content": [{"type": "text", "text": text}],
            "structuredContent": {"text": text},
            "isError": True,
        }

    def bearer(headers):
        value = headers.get("Authorization", "")
        if value.lower().startswith("bearer "):
            return value[7:].strip()
        return ""

    def api_json(token, base, path, params=None, method="GET", body=None):
        url = base + path
        if params:
            query = urllib.parse.urlencode(
                {k: v for k, v in params.items() if v not in (None, "")},
                doseq=True,
            )
            if query:
                url += "?" + query
        data = json.dumps(body).encode() if body is not None else None
        req = urllib.request.Request(url, data=data, method=method)
        req.add_header("Authorization", "Bearer " + token)
        req.add_header("Accept", "application/json")
        if body is not None:
            req.add_header("Content-Type", "application/json")
        with urllib.request.urlopen(req, timeout=30) as resp:
            return json.loads(resp.read().decode() or "{}")

    def api_bytes(token, base, path, params=None, method="GET"):
        url = base + path
        if params:
            query = urllib.parse.urlencode(
                {k: v for k, v in params.items() if v not in (None, "")},
                doseq=True,
            )
            if query:
                url += "?" + query
        req = urllib.request.Request(url, method=method)
        req.add_header("Authorization", "Bearer " + token)
        with urllib.request.urlopen(req, timeout=30) as resp:
            return resp.headers, resp.read()

    def multipart_json(token, base, path, metadata, content, mime_type, method="POST"):
        boundary = "toolhive-google-rest-mcp"
        metadata_part = json.dumps(metadata, separators=(",", ":")).encode()
        if content is None:
            return api_json(token, base, path, method=method, body=metadata)
        content_bytes = content_bytes_from_args(content)
        body = b"".join([
            b"--" + boundary.encode() + b"\r\n",
            b"Content-Type: application/json; charset=UTF-8\r\n\r\n",
            metadata_part,
            b"\r\n--" + boundary.encode() + b"\r\n",
            ("Content-Type: " + mime_type + "\r\n\r\n").encode(),
            content_bytes,
            b"\r\n--" + boundary.encode() + b"--\r\n",
        ])
        req = urllib.request.Request(base + path, data=body, method=method)
        req.add_header("Authorization", "Bearer " + token)
        req.add_header("Accept", "application/json")
        req.add_header("Content-Type", "multipart/related; boundary=" + boundary)
        with urllib.request.urlopen(req, timeout=30) as resp:
            return json.loads(resp.read().decode() or "{}")

    def gmail(token, path, params=None, method="GET", body=None):
        return api_json(token, GMAIL_API, path, params=params, method=method, body=body)

    def quote_path(value):
        return urllib.parse.quote(str(value), safe="")

    def header_map(message):
        headers = message.get("payload", {}).get("headers", [])
        return {h.get("name", "").lower(): h.get("value", "") for h in headers}

    def decode_part_body(part):
        data = part.get("body", {}).get("data")
        if not data:
            return ""
        padding = "=" * (-len(data) % 4)
        return base64.urlsafe_b64decode(data + padding).decode("utf-8", "replace")

    def collect_bodies(part):
        plain = []
        html = []
        stack = [part]
        while stack:
            current = stack.pop()
            mime = current.get("mimeType", "")
            if mime == "text/plain":
                plain.append(decode_part_body(current))
            elif mime == "text/html":
                html.append(decode_part_body(current))
            stack.extend(current.get("parts", []))
        return "\n".join(filter(None, plain)), "\n".join(filter(None, html))

    def message_summary(message, include_body=False):
        headers = header_map(message)
        result = {
            "id": message.get("id", ""),
            "threadId": message.get("threadId", ""),
            "labelIds": message.get("labelIds", []),
            "snippet": message.get("snippet", ""),
            "subject": headers.get("subject", ""),
            "sender": headers.get("from", ""),
            "toRecipients": [headers.get("to", "")] if headers.get("to") else [],
            "ccRecipients": [headers.get("cc", "")] if headers.get("cc") else [],
            "date": headers.get("date", ""),
        }
        if include_body:
            plain, html = collect_bodies(message.get("payload", {}))
            result["plaintextBody"] = plain
            result["htmlBody"] = html
            result["attachmentIds"] = []
            result["attachments"] = []
        return result

    def content_bytes_from_args(args):
        if isinstance(args, dict) and args.get("contentBase64"):
            data = args["contentBase64"]
            padding = "=" * (-len(data) % 4)
            return base64.b64decode(data + padding)
        if isinstance(args, dict):
            return (args.get("content") or "").encode()
        return str(args).encode()

    def encode_raw_message(args):
        msg = EmailMessage()
        msg["To"] = ", ".join(args.get("to", []))
        if args.get("cc"):
            msg["Cc"] = ", ".join(args.get("cc", []))
        if args.get("bcc"):
            msg["Bcc"] = ", ".join(args.get("bcc", []))
        msg["Subject"] = args.get("subject", "")
        msg["Date"] = formatdate(localtime=True)
        if args.get("from"):
            msg["From"] = args["from"]
        body = args.get("body", "")
        html_body = args.get("htmlBody")
        if html_body:
            msg.set_content(body or "")
            msg.add_alternative(html_body, subtype="html")
        else:
            msg.set_content(body)
        return base64.urlsafe_b64encode(msg.as_bytes()).decode().rstrip("=")

    def draft_body(args):
        return {"message": {"raw": encode_raw_message(args)}}

    def list_labels(token, args):
        labels = gmail(token, "/labels", {"pageToken": args.get("pageToken")}).get("labels", [])
        labels = [
            {
                "labelId": label.get("id", ""),
                "name": label.get("name", ""),
                "type": label.get("type", ""),
                "threadsTotal": label.get("threadsTotal", 0),
                "threadsUnread": label.get("threadsUnread", 0),
            }
            for label in labels
        ]
        page_size = args.get("pageSize")
        if isinstance(page_size, int) and page_size > 0:
            labels = labels[:page_size]
        return {"labels": labels}

    def search_threads(token, args):
        page_size = min(int(args.get("pageSize") or 20), 50)
        listed = gmail(token, "/threads", {
            "q": args.get("query", ""),
            "maxResults": page_size,
            "pageToken": args.get("pageToken", ""),
            "includeSpamTrash": bool(args.get("includeTrash", False)),
        })
        threads = []
        for item in listed.get("threads", []):
            thread = gmail(token, "/threads/" + urllib.parse.quote(item["id"]), {
                "format": "metadata",
                "metadataHeaders": ["Subject", "From", "To", "Cc", "Date"],
            })
            threads.append({
                "id": thread.get("id", item["id"]),
                "messages": [message_summary(m) for m in thread.get("messages", [])],
            })
        return {
            "threads": threads,
            "nextPageToken": listed.get("nextPageToken", ""),
            "resultCountEstimate": str(listed.get("resultSizeEstimate", 0)),
        }

    def get_thread(token, args):
        thread_id = args.get("threadId")
        if not thread_id:
            return mcp_error_text("threadId is required")
        fmt = args.get("messageFormat", "FULL_CONTENT")
        full = fmt in ("FULL_CONTENT", "MESSAGE_FORMAT_UNSPECIFIED", "")
        api_format = "full" if full else "metadata"
        params = {"format": api_format}
        if not full:
            params["metadataHeaders"] = ["Subject", "From", "To", "Cc", "Date"]
        thread = gmail(token, "/threads/" + urllib.parse.quote(thread_id), params)
        return {
            "id": thread.get("id", thread_id),
            "messages": [message_summary(m, include_body=full) for m in thread.get("messages", [])],
        }

    def create_draft(token, args):
        if not args.get("to"):
            return mcp_error_text("to is required")
        return gmail(token, "/drafts", method="POST", body=draft_body(args))

    def update_draft(token, args):
        draft_id = args.get("draftId")
        if not draft_id:
            return mcp_error_text("draftId is required")
        return gmail(token, "/drafts/" + quote_path(draft_id), method="PUT", body=draft_body(args))

    def send_draft(token, args):
        draft_id = args.get("draftId")
        if not draft_id:
            return mcp_error_text("draftId is required")
        return gmail(token, "/drafts/send", method="POST", body={"id": draft_id})

    def delete_draft(token, args):
        draft_id = args.get("draftId")
        if not draft_id:
            return mcp_error_text("draftId is required")
        gmail(token, "/drafts/" + quote_path(draft_id), method="DELETE")
        return {"draftId": draft_id, "deleted": True}

    def archive_message(token, args):
        message_id = args.get("messageId")
        if not message_id:
            return mcp_error_text("messageId is required")
        return gmail(token, "/messages/" + quote_path(message_id) + "/modify", method="POST", body={"removeLabelIds": ["INBOX"]})

    def archive_thread(token, args):
        thread_id = args.get("threadId")
        if not thread_id:
            return mcp_error_text("threadId is required")
        return gmail(token, "/threads/" + quote_path(thread_id) + "/modify", method="POST", body={"removeLabelIds": ["INBOX"]})

    def list_calendars(token, args):
        result = api_json(token, CALENDAR_API, "/users/me/calendarList", {
            "maxResults": args.get("pageSize"),
            "pageToken": args.get("pageToken"),
            "showHidden": args.get("showHidden"),
        })
        return {"calendars": result.get("items", []), "nextPageToken": result.get("nextPageToken", "")}

    def event_time(value, timezone=None):
        if len(value) == 10 and value.count("-") == 2:
            return {"date": value}
        result = {"dateTime": value}
        if timezone:
            result["timeZone"] = timezone
        return result

    def calendar_event_body(args):
        body = {
            "summary": args.get("summary", ""),
            "description": args.get("description", ""),
            "location": args.get("location", ""),
        }
        if args.get("start"):
            body["start"] = event_time(args["start"], args.get("timeZone"))
        if args.get("end"):
            body["end"] = event_time(args["end"], args.get("timeZone"))
        if args.get("attendees"):
            body["attendees"] = [{"email": email} for email in args.get("attendees", [])]
        return {k: v for k, v in body.items() if v not in ("", [], None)}

    def list_calendar_events(token, args):
        calendar_id = args.get("calendarId", "primary")
        result = api_json(token, CALENDAR_API, "/calendars/" + quote_path(calendar_id) + "/events", {
            "q": args.get("query"),
            "timeMin": args.get("timeMin"),
            "timeMax": args.get("timeMax"),
            "maxResults": args.get("pageSize", 20),
            "pageToken": args.get("pageToken"),
            "singleEvents": True,
            "orderBy": "startTime",
        })
        return {"events": result.get("items", []), "nextPageToken": result.get("nextPageToken", "")}

    def create_calendar_event(token, args):
        calendar_id = args.get("calendarId", "primary")
        if not args.get("summary"):
            return mcp_error_text("summary is required")
        if not args.get("start") or not args.get("end"):
            return mcp_error_text("start and end are required")
        return api_json(token, CALENDAR_API, "/calendars/" + quote_path(calendar_id) + "/events", method="POST", body=calendar_event_body(args))

    def update_calendar_event(token, args):
        calendar_id = args.get("calendarId", "primary")
        event_id = args.get("eventId")
        if not event_id:
            return mcp_error_text("eventId is required")
        return api_json(token, CALENDAR_API, "/calendars/" + quote_path(calendar_id) + "/events/" + quote_path(event_id), method="PATCH", body=calendar_event_body(args))

    def delete_calendar_event(token, args):
        calendar_id = args.get("calendarId", "primary")
        event_id = args.get("eventId")
        if not event_id:
            return mcp_error_text("eventId is required")
        api_json(token, CALENDAR_API, "/calendars/" + quote_path(calendar_id) + "/events/" + quote_path(event_id), method="DELETE")
        return {"calendarId": calendar_id, "eventId": event_id, "deleted": True}

    def check_calendar_freebusy(token, args):
        calendars = args.get("calendarIds") or ["primary"]
        if not args.get("timeMin") or not args.get("timeMax"):
            return mcp_error_text("timeMin and timeMax are required")
        body = {"timeMin": args["timeMin"], "timeMax": args["timeMax"], "items": [{"id": cal} for cal in calendars]}
        if args.get("timeZone"):
            body["timeZone"] = args["timeZone"]
        return api_json(token, CALENDAR_API, "/freeBusy", method="POST", body=body)

    def list_drive_files(token, args):
        result = api_json(token, DRIVE_API, "/files", {
            "q": args.get("query"),
            "pageSize": args.get("pageSize", 20),
            "pageToken": args.get("pageToken"),
            "spaces": "drive",
            "fields": args.get("fields", "nextPageToken,files(id,name,mimeType,modifiedTime,webViewLink,size)"),
        })
        return {"files": result.get("files", []), "nextPageToken": result.get("nextPageToken", "")}

    def get_drive_file_metadata(token, args):
        file_id = args.get("fileId")
        if not file_id:
            return mcp_error_text("fileId is required")
        return api_json(token, DRIVE_API, "/files/" + quote_path(file_id), {"fields": args.get("fields", "*")})

    def download_drive_file(token, args):
        file_id = args.get("fileId")
        if not file_id:
            return mcp_error_text("fileId is required")
        if args.get("exportMimeType"):
            headers, data = api_bytes(token, DRIVE_API, "/files/" + quote_path(file_id) + "/export", {"mimeType": args["exportMimeType"]})
        else:
            headers, data = api_bytes(token, DRIVE_API, "/files/" + quote_path(file_id), {"alt": "media"})
        result = {
            "fileId": file_id,
            "mimeType": headers.get("Content-Type", ""),
            "contentBase64": base64.b64encode(data).decode(),
        }
        try:
            result["text"] = data.decode("utf-8")
        except UnicodeDecodeError:
            pass
        return result

    def create_drive_file(token, args):
        metadata = {"name": args.get("name", "Untitled")}
        if args.get("mimeType"):
            metadata["mimeType"] = args["mimeType"]
        if args.get("parents"):
            metadata["parents"] = args["parents"]
        mime_type = args.get("contentMimeType", "text/plain")
        return multipart_json(token, DRIVE_UPLOAD_API, "/files?uploadType=multipart&fields=id,name,mimeType,webViewLink", metadata, args, mime_type)

    def update_drive_file(token, args):
        file_id = args.get("fileId")
        if not file_id:
            return mcp_error_text("fileId is required")
        metadata = {k: args[k] for k in ("name", "mimeType") if args.get(k)}
        mime_type = args.get("contentMimeType", "text/plain")
        content = args if args.get("content") or args.get("contentBase64") else None
        return multipart_json(token, DRIVE_UPLOAD_API, "/files/" + quote_path(file_id) + "?uploadType=multipart&fields=id,name,mimeType,webViewLink", metadata, content, mime_type, method="PATCH")

    def delete_drive_file(token, args):
        file_id = args.get("fileId")
        if not file_id:
            return mcp_error_text("fileId is required")
        api_json(token, DRIVE_API, "/files/" + quote_path(file_id), method="DELETE")
        return {"fileId": file_id, "deleted": True}

