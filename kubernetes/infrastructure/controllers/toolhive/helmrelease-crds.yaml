apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-operator-crds
  namespace: toolhive-system
spec:
  interval: 30m
  chart:
    spec:
      chart: toolhive-operator-crds
      version: "0.29.3"
      sourceRef:
        kind: HelmRepository
        name: toolhive
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
