apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: gmail-mcp
  namespace: toolhive-system
spec:
  description: Google Workspace Gmail MCP backends for shared agent access.
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPExternalAuthConfig
metadata:
  name: gmail-google-upstream-token
  namespace: toolhive-system
spec:
  type: upstreamInject
  upstreamInject:
    providerName: google
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServerEntry
metadata:
  name: gmail
  namespace: toolhive-system
spec:
  groupRef:
    name: gmail-mcp
  remoteUrl: https://gmailmcp.googleapis.com/mcp/v1
  transport: streamable-http
  externalAuthConfigRef:
    name: gmail-google-upstream-token
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPOIDCConfig
metadata:
  name: gmail-mcp
  namespace: toolhive-system
spec:
  type: inline
  inline:
    issuer: https://gmail-mcp.home.mcnees.me
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: gmail-mcp
  namespace: toolhive-system
spec:
  groupRef:
    name: gmail-mcp
  serviceType: ClusterIP
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: gmail-mcp
      audience: https://gmail-mcp.home.mcnees.me
      resourceUrl: https://gmail-mcp.home.mcnees.me/mcp
      scopes:
        - openid
        - email
        - profile
  authServerConfig:
    issuer: https://gmail-mcp.home.mcnees.me
    authorizationEndpointBaseUrl: https://gmail-mcp.home.mcnees.me
    primaryUpstreamProvider: google
    baselineClientScopes:
      - openid
    signingKeySecretRefs:
      - name: gmail-mcp-auth
        key: signing-key.pem
    hmacSecretRefs:
      - name: gmail-mcp-auth
        key: hmac-secret
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 720h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: google
        type: oidc
        oidcConfig:
          issuerUrl: https://accounts.google.com
          clientId: 697355755028-s7k8ca3sasiirkgsj3hvg7r33ueolbof.apps.googleusercontent.com
          clientSecretRef:
            name: gmail-mcp-auth
            key: google-client-secret
          redirectUri: https://gmail-mcp.home.mcnees.me/oauth/callback
          scopes:
            - openid
            - email
            - profile
            - https://www.googleapis.com/auth/gmail.readonly
            - https://www.googleapis.com/auth/gmail.compose
          additionalAuthorizationParams:
            access_type: offline
            prompt: consent
  outgoingAuth:
    source: discovered
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gmail-mcp
  namespace: toolhive-system
spec:
  secretName: gmail-mcp-tls
  dnsNames:
    - gmail-mcp.home.mcnees.me
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gmail-mcp
  namespace: toolhive-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gmail-mcp.home.mcnees.me`)
      kind: Rule
      services:
        - name: gmail-mcp
          port: 4483
  tls:
    secretName: gmail-mcp-tls
