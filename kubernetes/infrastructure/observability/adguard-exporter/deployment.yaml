apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-exporter-a
  namespace: observability
  labels:
    app.kubernetes.io/name: adguard-exporter
    app.kubernetes.io/instance: adguard-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard-exporter
      app.kubernetes.io/instance: adguard-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard-exporter
        app.kubernetes.io/instance: adguard-a
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: ebrianne/adguard_exporter:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 9617
              protocol: TCP
          env:
            - name: adguard_protocol
              value: http
            - name: adguard_hostname
              value: adguard-a.apps.svc.cluster.local
            - name: adguard_port
              value: "80"
            - name: adguard_username
              valueFrom:
                secretKeyRef:
                  name: adguard-exporter-credentials
                  key: ADGUARD_USERNAME
            - name: adguard_password
              valueFrom:
                secretKeyRef:
                  name: adguard-exporter-credentials
                  key: ADGUARD_PASSWORD
            - name: interval
              value: 30s
            - name: log_limit
              value: "10000"
            - name: server_port
              value: "9617"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
