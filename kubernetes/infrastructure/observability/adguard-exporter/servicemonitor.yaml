apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: adguard-exporter
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard-exporter
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
