apiVersion: v1
kind: Service
metadata:
  name: adguard-exporter-a
  namespace: observability
  labels:
    app.kubernetes.io/name: adguard-exporter
    app.kubernetes.io/instance: adguard-a
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: adguard-exporter
    app.kubernetes.io/instance: adguard-a
  ports:
    - name: http
      port: 9617
      targetPort: http
      protocol: TCP
---
