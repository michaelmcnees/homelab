apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: tailscale-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tailscale-exporter
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: python:3.13.3-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -ec
            - |
              pip install --quiet --no-cache-dir prometheus_client
              exec python3 /scripts/exporter.py
          env:
            - name: TAILSCALE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tailscale-exporter-credentials
                  key: TAILSCALE_CLIENT_ID
            - name: TAILSCALE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tailscale-exporter-credentials
                  key: TAILSCALE_CLIENT_SECRET
            - name: TAILSCALE_TAILNET
              value: "-"
            - name: INTERVAL_SECONDS
              value: "60"
            - name: ONLINE_THRESHOLD_SECONDS
              value: "300"
            - name: PORT
              value: "9619"
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 9619
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 60
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 96Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: tailscale-exporter-script
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tailscale-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: tailscale-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tailscale-exporter
  ports:
    - name: http
      port: 9619
      targetPort: http
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tailscale-exporter
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-exporter
  endpoints:
    - port: http
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
