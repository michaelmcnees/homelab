apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
      relabelings:
        - targetLabel: instance
          replacement: proxmox-exporter
    - port: http
      path: /pve
      interval: 60s
      scrapeTimeout: 30s
      params:
        target:
          - 10.0.3.196
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance
        - targetLabel: proxmox_node
          replacement: latios
    - port: http
      path: /pve
      interval: 60s
      scrapeTimeout: 30s
      params:
        target:
          - 10.0.3.40
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance
        - targetLabel: proxmox_node
          replacement: latias
    - port: http
      path: /pve
      interval: 60s
      scrapeTimeout: 30s
      params:
        target:
          - 10.0.1.100
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels:
            - __param_target
          targetLabel: instance
        - targetLabel: proxmox_node
          replacement: rayquaza
