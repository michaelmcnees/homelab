apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxmox-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: proxmox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxmox-exporter
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxmox-exporter
          image: prompve/prometheus-pve-exporter:3.8.2
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/pve.yml
            - --web.listen-address=:9221
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: http
              containerPort: 9221
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/pve.yml
              subPath: pve.yml
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: proxmox-exporter-config
