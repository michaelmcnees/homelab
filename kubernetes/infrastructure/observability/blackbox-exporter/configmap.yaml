apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter
  namespace: observability
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          preferred_ip_protocol: ip4
          valid_http_versions:
            - HTTP/1.1
            - HTTP/2.0
          follow_redirects: true
      tcp_connect:
        prober: tcp
        timeout: 5s
      dns_cloudflare:
        prober: dns
        timeout: 5s
        dns:
          query_name: cloudflare.com
          query_type: A
          preferred_ip_protocol: ip4
