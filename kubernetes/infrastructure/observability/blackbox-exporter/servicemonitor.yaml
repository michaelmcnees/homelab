apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blackbox-exporter
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: network-probes
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
  endpoints:
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - tcp_connect
        target:
          - 10.0.10.200:443
      relabelings:
        - targetLabel: probe
          replacement: traefik-internal-https
        - targetLabel: network_path
          replacement: lan
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - tcp_connect
        target:
          - 10.0.0.17:443
      relabelings:
        - targetLabel: probe
          replacement: unifi-console-https
        - targetLabel: network_path
          replacement: lan
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - tcp_connect
        target:
          - 1.1.1.1:443
      relabelings:
        - targetLabel: probe
          replacement: cloudflare-https
        - targetLabel: network_path
          replacement: wan
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - tcp_connect
        target:
          - 8.8.8.8:53
      relabelings:
        - targetLabel: probe
          replacement: google-dns-tcp
        - targetLabel: network_path
          replacement: wan
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - dns_cloudflare
        target:
          - 10.0.0.18:53
      relabelings:
        - targetLabel: probe
          replacement: adguard-dns
        - targetLabel: network_path
          replacement: lan
    - port: http
      path: /probe
      interval: 30s
      scrapeTimeout: 10s
      params:
        module:
          - dns_cloudflare
        target:
          - 1.1.1.1:53
      relabelings:
        - targetLabel: probe
          replacement: cloudflare-dns
        - targetLabel: network_path
          replacement: wan
