apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel
  namespace: observability
  labels:
    app.kubernetes.io/name: beszel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: beszel
          image: henrygd/beszel:0.18.7
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_URL
              value: https://beszel.home.mcnees.me
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /beszel_data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beszel-data
