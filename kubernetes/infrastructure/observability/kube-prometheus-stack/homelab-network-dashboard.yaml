apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-network-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-network.json: |
    {
      "title": "Homelab Network",
      "uid": "homelab-network",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["homelab", "network"],
      "time": {"from": "now-24h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Probe Success",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg(probe_success{namespace=\"observability\"})", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.95}, {"color": "green", "value": 0.99}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "UniFi Poller Up",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "up{namespace=\"observability\", service=\"unpoller\"}", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "WAN Probe Success",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg(probe_success{network_path=\"wan\"})", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.95}, {"color": "green", "value": 0.99}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Probe Duration",
          "gridPos": {"x": 0, "y": 5, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_duration_seconds{namespace=\"observability\"}", "legendFormat": "{{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "DNS Lookup Duration",
          "gridPos": {"x": 12, "y": 5, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_dns_lookup_time_seconds{namespace=\"observability\"}", "legendFormat": "{{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Probe Success by Target",
          "gridPos": {"x": 0, "y": 13, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_success{namespace=\"observability\"}", "legendFormat": "{{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "none", "min": 0, "max": 1}, "overrides": []}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "UniFi Metric Volume",
          "gridPos": {"x": 12, "y": 13, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count by (__name__) ({__name__=~\"unifipoller_.*\"})", "legendFormat": "{{__name__}}"}],
          "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}
        }
      ]
    }
