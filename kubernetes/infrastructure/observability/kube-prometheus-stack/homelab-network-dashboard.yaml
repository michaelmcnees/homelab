apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-network-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-network.json: |
    {
      "title": "Homelab Network",
      "uid": "homelab-network",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "tags": ["homelab", "network", "wifi", "internet"],
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": ["homelab"],
          "targetBlank": false,
          "title": "Homelab dashboards",
          "type": "dashboards"
        }
      ],
      "time": {"from": "now-24h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "WAN Download Speedtest",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(unpoller_device_speedtest_download)", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "Mbits", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 300}, {"color": "green", "value": 700}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "WAN Upload Speedtest",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(unpoller_device_speedtest_upload)", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "Mbits", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 300}, {"color": "green", "value": 700}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "WAN Probe Success",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg(probe_success{network_path=\"wan\"})", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.95}, {"color": "green", "value": 0.99}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Wi-Fi Satisfaction",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg(unpoller_client_satisfaction_ratio{wired=\"false\"})", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.85}, {"color": "green", "value": 0.95}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Probe Latency by Target",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_duration_seconds{namespace=\"observability\"}", "legendFormat": "{{network_path}} / {{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Probe Availability by Target",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_success{namespace=\"observability\"}", "legendFormat": "{{network_path}} / {{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "none", "min": 0, "max": 1}, "overrides": []}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "DNS Lookup Time",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "probe_dns_lookup_time_seconds{namespace=\"observability\"}", "legendFormat": "{{probe}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "UniFi Site / Gateway Latency",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "unpoller_site_latency_seconds", "legendFormat": "site {{subsystem}} / {{status}}"},
            {"refId": "B", "expr": "unpoller_device_uplink_latency_seconds", "legendFormat": "{{name}} uplink"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "WAN Throughput",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "max by (name) (unpoller_device_wan_receive_rate_bytes) * 8", "legendFormat": "{{name}} download"},
            {"refId": "B", "expr": "max by (name) (unpoller_device_wan_transmit_rate_bytes) * 8", "legendFormat": "{{name}} upload"}
          ],
          "fieldConfig": {"defaults": {"unit": "bps"}, "overrides": []}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "UniFi Speedtest History",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "max by (name) (unpoller_device_speedtest_download)", "legendFormat": "{{name}} download"},
            {"refId": "B", "expr": "max by (name) (unpoller_device_speedtest_upload)", "legendFormat": "{{name}} upload"}
          ],
          "fieldConfig": {"defaults": {"unit": "Mbits"}, "overrides": []}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "AP Channel Utilization",
          "gridPos": {"x": 0, "y": 28, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "avg by (name, radio_name) (unpoller_device_radio_channel_utilization_total_ratio)", "legendFormat": "{{name}} {{radio_name}} total"},
            {"refId": "B", "expr": "avg by (name, radio_name) (unpoller_device_radio_channel_utilization_transmit_ratio)", "legendFormat": "{{name}} {{radio_name}} tx"},
            {"refId": "C", "expr": "avg by (name, radio_name) (unpoller_device_radio_channel_utilization_receive_ratio)", "legendFormat": "{{name}} {{radio_name}} rx"}
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}, "overrides": []}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Wi-Fi Satisfaction by AP / SSID",
          "gridPos": {"x": 12, "y": 28, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg by (ap_name, essid) (unpoller_client_satisfaction_ratio{wired=\"false\"})", "legendFormat": "{{ap_name}} / {{essid}}"}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}, "overrides": []}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Wi-Fi Client RSSI",
          "gridPos": {"x": 0, "y": 36, "w": 8, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "avg by (ap_name, essid) (unpoller_client_rssi_db{wired=\"false\"})", "legendFormat": "{{ap_name}} / {{essid}}"}],
          "fieldConfig": {"defaults": {"unit": "dB"}, "overrides": []}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Wi-Fi Client Link Rates",
          "gridPos": {"x": 8, "y": 36, "w": 8, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "avg by (ap_name, essid) (unpoller_client_radio_receive_rate_bps{wired=\"false\"})", "legendFormat": "{{ap_name}} / {{essid}} rx"},
            {"refId": "B", "expr": "avg by (ap_name, essid) (unpoller_client_radio_transmit_rate_bps{wired=\"false\"})", "legendFormat": "{{ap_name}} / {{essid}} tx"}
          ],
          "fieldConfig": {"defaults": {"unit": "bps"}, "overrides": []}
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Wi-Fi Clients by AP / SSID",
          "gridPos": {"x": 16, "y": 36, "w": 8, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count by (ap_name, essid) (unpoller_client_uptime_seconds{wired=\"false\"})", "legendFormat": "{{ap_name}} / {{essid}}"}],
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0}, "overrides": []}
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Wi-Fi Retry Counters",
          "gridPos": {"x": 0, "y": 44, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (name, radio_name) (rate(unpoller_device_vap_transmit_retries_total[10m]))", "legendFormat": "{{name}} {{radio_name}} retries"},
            {"refId": "B", "expr": "sum by (name, radio_name) (rate(unpoller_device_vap_transmit_dropped_total[10m]))", "legendFormat": "{{name}} {{radio_name}} drops"}
          ],
          "fieldConfig": {"defaults": {"unit": "pps"}, "overrides": []}
        },
        {
          "id": 17,
          "type": "table",
          "title": "Lowest Wi-Fi Satisfaction Clients",
          "gridPos": {"x": 12, "y": 44, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "bottomk(20, unpoller_client_satisfaction_ratio{wired=\"false\"})", "format": "table", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percentunit", "custom": {"align": "auto", "inspect": false}}, "overrides": []},
          "options": {"showHeader": true}
        }
      ]
    }
