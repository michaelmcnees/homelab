apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-auth-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-auth.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": ["homelab"],
          "targetBlank": false,
          "title": "Homelab dashboards",
          "type": "dashboards"
        }
      ],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [
                {"options": {"0": {"color": "red", "index": 0, "text": "Down"}}, "type": "value"},
                {"options": {"1": {"color": "green", "index": 1, "text": "Up"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "ready"},
                "properties": [
                  {"id": "custom.cellOptions", "value": {"type": "color-background"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "red", "value": null},
                        {"color": "green", "value": 1}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "available"},
                "properties": [{"id": "unit", "value": "short"}]
              }
            ]
          },
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "min by (deployment) (kube_deployment_status_replicas_available{namespace=\"auth\"} == kube_deployment_spec_replicas{namespace=\"auth\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "ready",
              "range": false,
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kube_deployment_status_replicas_available{namespace=\"auth\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "available",
              "range": false,
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kube_deployment_spec_replicas{namespace=\"auth\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "desired",
              "range": false,
              "refId": "C"
            }
          ],
          "title": "Auth Deployments",
          "transformations": [
            {
              "id": "joinByField",
              "options": {"byField": "deployment", "mode": "outer"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "namespace 1": true,
                  "namespace 2": true,
                  "namespace 3": true
                },
                "indexByName": {
                  "deployment": 0,
                  "Value #A": 1,
                  "Value #B": 2,
                  "Value #C": 3
                },
                "renameByName": {
                  "Value #A": "ready",
                  "Value #B": "available",
                  "Value #C": "desired"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 6},
          "id": 2,
          "panels": [],
          "title": "OAuth2 Proxy",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 7},
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum(rate(oauth2_proxy_requests_total[5m]))",
              "legendFormat": "req/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total Auth Request Rate",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 7},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "(sum(rate(oauth2_proxy_requests_total{code=~\"5..\"}[5m])) or vector(0)) / sum(rate(oauth2_proxy_requests_total[5m]))",
              "legendFormat": "5xx %",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "5xx Rate",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.05},
                  {"color": "red", "value": 0.20}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 7},
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "(sum(rate(oauth2_proxy_requests_total{code=~\"4..\"}[5m])) or vector(0)) / sum(rate(oauth2_proxy_requests_total[5m]))",
              "legendFormat": "4xx %",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "4xx Rate",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "red", "value": 1.0}
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 7},
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(oauth2_proxy_requests_duration_seconds_bucket[5m])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "p95 Latency",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
