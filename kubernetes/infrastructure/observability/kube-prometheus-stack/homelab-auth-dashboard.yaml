              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 11},
          "id": 8,
          "options": {
            "legend": {
              "calcs": ["lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "histogram_quantile(0.50, sum by (le) (rate(oauth2_proxy_requests_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(oauth2_proxy_requests_duration_seconds_bucket[5m])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(oauth2_proxy_requests_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Request Latency Percentiles",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 19},
          "id": 9,
          "panels": [],
          "title": "Pocket ID & LLDAP — pod and log signals",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
