            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum by (code) (rate(oauth2_proxy_requests_total[5m]))",
              "legendFormat": "{{code}}",
              "range": true,
              "refId": "A"
