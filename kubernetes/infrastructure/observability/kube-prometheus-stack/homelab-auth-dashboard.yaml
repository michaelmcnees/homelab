              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"auth\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
