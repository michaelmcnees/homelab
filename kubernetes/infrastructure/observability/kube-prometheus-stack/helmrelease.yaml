apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  driftDetection:
    mode: enabled
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.10.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    defaultRules:
      create: true
      disabled:
        TargetDown: true
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-homelab-config
        externalUrl: https://alertmanager.home.mcnees.me
        retention: 8760h
        initContainers:
          - name: init-alertmanager-data
            image: busybox:1.38.0
            command:
              - sh
              - -c
              - |
                chown -R 1000:2000 /alertmanager
                chmod -R g+rwX /alertmanager
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
            volumeMounts:
              - name: alertmanager-kube-prometheus-stack-alertmanager-db
                mountPath: /alertmanager
                subPath: alertmanager-db
        priorityClassName: standard
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      initChownData:
        enabled: false
      ingress:
        enabled: false
      persistence:
        enabled: true
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        size: 5Gi
      sidecar:
        datasources:
          alertmanager:
            enabled: false
      grafana.ini:
        feature_toggles:
          provisioning: false
        server:
          root_url: https://grafana.home.mcnees.me
        auth:
          disable_login_form: true
        auth.proxy:
          enabled: true
          header_name: X-Auth-Request-Email
          header_property: email
          auto_sign_up: true
          sync_ttl: 60
        users:
          auto_assign_org: true
          auto_assign_org_role: Viewer
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    nodeExporter:
      enabled: true
    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.home.mcnees.me
        initContainers:
          - name: init-prometheus-data
            image: busybox:1.38.0
            command:
              - sh
              - -c
              - |
                chown -R 1000:2000 /prometheus
                chmod -R g+rwX /prometheus
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db
        priorityClassName: standard
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
    prometheus-node-exporter:
      enabled: true
