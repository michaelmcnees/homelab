apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-storage-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-storage.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": ["homelab"],
          "targetBlank": false,
          "title": "Homelab dashboards",
          "type": "dashboards"
        }
      ],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "count(kubelet_volume_stats_capacity_bytes)",
              "legendFormat": "PVCs",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Tracked PVCs",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 3}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "count(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85)",
              "legendFormat": "PVCs > 85%",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "PVCs Over 85% Full",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 3}
                ]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum(kubelet_volume_stats_capacity_bytes)",
              "legendFormat": "total",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total Provisioned",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum(kubelet_volume_stats_used_bytes)",
              "legendFormat": "used",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total Used",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false,
                "filterable": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "fill %"},
                "properties": [
                  {"id": "unit", "value": "percentunit"},
                  {"id": "custom.cellOptions", "value": {"type": "gauge", "mode": "gradient"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "yellow", "value": 0.75},
                        {"color": "orange", "value": 0.85},
                        {"color": "red", "value": 0.95}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "used"},
                "properties": [{"id": "unit", "value": "decbytes"}]
              },
              {
                "matcher": {"id": "byName", "options": "capacity"},
                "properties": [{"id": "unit", "value": "decbytes"}]
              }
            ]
          },
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 4},
          "id": 5,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "fill %"}]
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes",
              "format": "table",
              "instant": true,
              "legendFormat": "fill %",
              "range": false,
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kubelet_volume_stats_used_bytes",
              "format": "table",
              "instant": true,
              "legendFormat": "used",
              "range": false,
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kubelet_volume_stats_capacity_bytes",
              "format": "table",
              "instant": true,
              "legendFormat": "capacity",
              "range": false,
              "refId": "C"
            }
          ],
          "title": "PVC Fill — sorted descending",
          "transformations": [
            {
              "id": "joinByField",
              "options": {"byField": "persistentvolumeclaim", "mode": "outer"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "__name__ 1": true,
                  "__name__ 2": true,
                  "__name__ 3": true,
                  "endpoint 1": true,
                  "endpoint 2": true,
                  "endpoint 3": true,
                  "instance 1": true,
                  "instance 2": true,
                  "instance 3": true,
                  "job 1": true,
                  "job 2": true,
                  "job 3": true,
                  "metrics_path 1": true,
                  "metrics_path 2": true,
                  "metrics_path 3": true,
                  "namespace 2": true,
                  "namespace 3": true,
                  "node 2": true,
                  "node 3": true,
                  "service 1": true,
                  "service 2": true,
                  "service 3": true,
                  "container 1": true,
                  "container 2": true,
                  "container 3": true
                },
                "indexByName": {
                  "namespace 1": 0,
                  "persistentvolumeclaim": 1,
                  "node 1": 2,
                  "Value #A": 3,
                  "Value #B": 4,
                  "Value #C": 5
                },
                "renameByName": {
                  "namespace 1": "namespace",
                  "node 1": "node",
                  "Value #A": "fill %",
                  "Value #B": "used",
                  "Value #C": "capacity"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "barWidthFactor": 0.6,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "line+area"}
              },
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.85},
                  {"color": "red", "value": 0.95}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 6,
          "options": {
            "legend": {
              "calcs": ["lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "1 - (node_filesystem_avail_bytes{fstype!=\"\", mountpoint=~\"/|/var\"} / node_filesystem_size_bytes{fstype!=\"\", mountpoint=~\"/|/var\"})",
              "legendFormat": "{{instance}} {{mountpoint}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Node Filesystem Fill (root + /var)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "barWidthFactor": 0.6,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "normal"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 7,
          "options": {
            "legend": {
              "calcs": ["lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "sum by (namespace) (kubelet_volume_stats_capacity_bytes)",
              "legendFormat": "{{namespace}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Provisioned Capacity By Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false,
                "filterable": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 24},
          "id": 8,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true
          },
          "pluginVersion": "12.3.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "editorMode": "code",
              "expr": "kube_pod_spec_volumes_persistentvolumeclaims_info * on(namespace, pod) group_left(node) kube_pod_info",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "PVC → Pod → Node",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "service": true,
                  "container": true,
                  "uid": true,
                  "host_ip": true,
                  "pod_ip": true,
                  "created_by_kind": true,
                  "created_by_name": true,
                  "host_network": true,
                  "node_uid": true,
                  "Value": true,
                  "volume": true
                },
                "indexByName": {
                  "namespace": 0,
                  "persistentvolumeclaim": 1,
                  "pod": 2,
                  "node": 3
                },
                "renameByName": {}
              }
            }
          ],
          "type": "table"
        }
      ],
      "preload": false,
      "refresh": "30s",
      "schemaVersion": 42,
      "tags": ["homelab", "storage"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Homelab / Storage",
      "uid": "homelab-storage",
      "version": 1
    }
