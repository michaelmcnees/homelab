apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-ai-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-ai.json: |
    {
      "title": "Homelab AI",
      "uid": "homelab-ai",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["homelab", "ai"],
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": ["homelab"],
          "targetBlank": false,
          "title": "Homelab dashboards",
          "type": "dashboards"
        }
      ],
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "AI Workloads Ready",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(kube_deployment_status_replicas_available{namespace=\"apps\", deployment=~\"ollama|open-webui|hermes|paperless-gpt\"})", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 3}, {"color": "green", "value": 4}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Loaded Ollama Model",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "ollama_model_loaded_info", "instant": true, "legendFormat": "{{model}} {{parameters}} {{quantization}}"}],
          "fieldConfig": {"defaults": {"unit": "none", "mappings": [{"type": "value", "options": {"1": {"text": "loaded"}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "name", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Ollama Model RAM",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "ollama_model_size_bytes", "instant": true, "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 10000000000}, {"color": "red", "value": 18000000000}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Ollama Context",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "ollama_model_context_length", "instant": true, "legendFormat": "{{model}}"}],
          "fieldConfig": {"defaults": {"unit": "none", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 64000}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "AI CPU",
          "gridPos": {"x": 0, "y": 5, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"apps\", pod=~\"ollama-.*|open-webui-.*|hermes-.*|paperless-gpt-.*\", container!=\"\", image!=\"\"}[$__rate_interval]))", "legendFormat": "{{pod}}"}],
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "AI Memory",
          "gridPos": {"x": 12, "y": 5, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"apps\", pod=~\"ollama-.*|open-webui-.*|hermes-.*|paperless-gpt-.*\", container!=\"\", image!=\"\"})", "legendFormat": "{{pod}}"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "AI Restarts",
          "gridPos": {"x": 0, "y": 13, "w": 8, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace=\"apps\", pod=~\"ollama-.*|open-webui-.*|hermes-.*|paperless-gpt-.*\"}[$__rate_interval]))", "legendFormat": "{{pod}} / {{container}}"}],
          "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "AI Log Warnings and Errors",
          "gridPos": {"x": 8, "y": 13, "w": 8, "h": 8},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (pod) (count_over_time({namespace=\"apps\", pod=~\"ollama-.*|open-webui-.*|hermes-.*|paperless-gpt-.*\"} |~ \"(?i)(error|failed|exception|warning|timeout|500)\" [$__interval]))", "legendFormat": "{{pod}}"}],
          "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}
        },
        {
          "id": 9,
          "type": "logs",
          "title": "AI Logs",
          "gridPos": {"x": 16, "y": 13, "w": 8, "h": 8},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "{namespace=\"apps\", pod=~\"ollama-.*|open-webui-.*|hermes-.*|paperless-gpt-.*\"} |~ \"(?i)(model|context|chat|completion|telegram|paperless|error|warning|timeout)\""}],
          "options": {"showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true}
        }
      ]
    }
