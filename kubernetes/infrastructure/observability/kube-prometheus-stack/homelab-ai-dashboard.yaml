apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-homelab-ai-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  homelab-ai.json: |
    {
      "title": "Homelab AI",
      "uid": "homelab-ai",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "tags": [
        "homelab",
        "ai"
      ],
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": false,
          "keepTime": true,
          "tags": [
            "homelab"
          ],
          "targetBlank": false,
          "title": "Homelab dashboards",
          "type": "dashboards"
        }
      ],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "AI Workload Readiness",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_deployment_status_replicas_available{namespace=\"apps\", deployment=~\"$ai_workload\"}) / sum(kube_deployment_spec_replicas{namespace=\"apps\", deployment=~\"$ai_workload\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.75
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "id": 2,
          "type": "table",
          "title": "AI Deployment Availability",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_status_replicas_available{namespace=\"apps\", deployment=~\"$ai_workload\"}",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "cellOptions": {
                  "type": "auto"
                },
                "align": "auto",
                "inspect": false
              },
              "links": []
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "deployment"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open workload logs",
                        "url": "/d/homelab-pod-logs/homelab-pod-logs?var-namespace=apps&var-pod=${__value.raw}-.+",
                        "targetBlank": false
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "available replicas"
                  }
                ]
              }
            ]
          },
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "job": true,
                  "instance": true,
                  "endpoint": true,
                  "service": true,
                  "namespace": true,
                  "pod": true
                },
                "indexByName": {},
                "renameByName": {
                  "deployment": "deployment",
                  "Value": "available replicas"
                }
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Ollama Models By RAM",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ollama_model_size_bytes{model=~\"$ollama_model\"}",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "cellOptions": {
                  "type": "auto"
                },
                "align": "auto",
                "inspect": false
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "size"
                  },
                  {
                    "id": "unit",
                    "value": "bytes"
                  }
                ]
              }
            ]
          },
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "job": true,
                  "instance": true
                },
                "indexByName": {},
                "renameByName": {
                  "model": "model",
                  "parameters": "parameters",
                  "quantization": "quantization",
                  "Value": "size"
                }
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "table",
          "title": "Ollama Model Context",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "ollama_model_context_length{model=~\"$ollama_model\"}",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "cellOptions": {
                  "type": "auto"
                },
                "align": "auto",
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 64000
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "context tokens"
                  }
                ]
              }
            ]
          },
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "job": true,
                  "instance": true
                },
                "indexByName": {},
                "renameByName": {
                  "model": "model",
                  "Value": "context tokens"
                }
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "AI CPU",
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"apps\", pod=~\"($ai_workload)-.*\", container!=\"\", image!=\"\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "AI Memory",
          "gridPos": {
            "x": 12,
            "y": 5,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"apps\", pod=~\"($ai_workload)-.*\", container!=\"\", image!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "AI Restarts",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace=\"apps\", pod=~\"($ai_workload)-.*\"}[$__rate_interval]))",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "AI Log Warnings and Errors",
          "gridPos": {
            "x": 8,
            "y": 13,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (count_over_time({namespace=\"apps\", pod=~\"($ai_workload)-.*\"} |~ \"(?i)(error|failed|exception|warning|timeout|500)\" [$__interval]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "logs",
          "title": "AI Logs",
          "gridPos": {
            "x": 16,
            "y": 13,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"apps\", pod=~\"($ai_workload)-.*\"} |~ \"(?i)(model|context|chat|completion|telegram|paperless|error|warning|timeout)\""
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(kube_deployment_status_replicas{namespace=\"apps\", deployment=~\"ollama|open-webui|hermes|paperless-gpt\"}, deployment)",
            "includeAll": true,
            "allValue": "ollama|open-webui|hermes|paperless-gpt",
            "multi": true,
            "name": "ai_workload",
            "query": "label_values(kube_deployment_status_replicas{namespace=\"apps\", deployment=~\"ollama|open-webui|hermes|paperless-gpt\"}, deployment)",
            "refresh": 1,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(ollama_model_available_info, model)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "name": "ollama_model",
            "query": "label_values(ollama_model_available_info, model)",
            "refresh": 1,
            "sort": 1,
            "type": "query"
          }
        ]
      }
    }
