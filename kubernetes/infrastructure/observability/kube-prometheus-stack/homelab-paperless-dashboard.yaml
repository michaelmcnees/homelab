              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "sum by (pod) (count_over_time({namespace=\"apps\", pod=~\"paperless-ngx-.*|paperless-gpt-.*|ollama-.*\"} |~ \"(?i)(Consuming|consumption finished|New document id|/api/chat|truncating input prompt)\" [$__interval]))",
              "legendFormat": "{{pod}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Document And AI Activity",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 20
          },
          "id": 8,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"apps\", pod=~\"paperless-ngx-.*|paperless-gpt-.*|ollama-.*\"} |~ \"(?i)(Consuming|consumption finished|New document id|/api/chat|truncating|error|failed|warning|timeout)\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Paperless Workflow Logs",
