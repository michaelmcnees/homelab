apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: homelab.certificates
      rules:
        - alert: HomelabCertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 21 * 24 * 60 * 60
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires soon"
            description: "The cert-manager Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 21 days."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#alerts"
        - alert: HomelabCertificateExpiringCritical
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 60 * 60
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires critically soon"
            description: "The cert-manager Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 7 days."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#alerts"
    - name: homelab.kubernetes
      rules:
        - alert: HomelabPodRestartingFrequently
          expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace!="kube-system"}[30m])) > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 10 times in the last 30 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#alerts"
    - name: homelab.storage
      rules:
        - alert: HomelabPVCFillingUp
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is over 85% full"
            description: "The {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} PVC has been above 85% usage for 30 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#alerts"
    - name: homelab.paperless
      rules:
        - alert: HomelabPaperlessAppUnavailable
          expr: kube_deployment_status_replicas_available{namespace="apps", deployment=~"paperless-ngx|paperless-gpt|ollama"} < kube_deployment_spec_replicas{namespace="apps", deployment=~"paperless-ngx|paperless-gpt|ollama"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.deployment }} has unavailable replicas"
            description: "The apps/{{ $labels.deployment }} deployment has had fewer available replicas than desired for 5 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/paperless.md"
        - alert: HomelabPaperlessContainerRestarting
          expr: sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace="apps", pod=~"paperless-.*|ollama-.*"}[30m])) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.pod }} is restarting"
            description: "Container {{ $labels.container }} in apps/{{ $labels.pod }} restarted more than twice in the last 30 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/paperless.md"
        - alert: HomelabPaperlessStorageFillingUp
          expr: kubelet_volume_stats_used_bytes{namespace="apps", persistentvolumeclaim=~"paperless-.*"} / kubelet_volume_stats_capacity_bytes{namespace="apps", persistentvolumeclaim=~"paperless-.*"} > 0.85
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Paperless PVC {{ $labels.persistentvolumeclaim }} is over 85% full"
            description: "The apps/{{ $labels.persistentvolumeclaim }} PVC has been above 85% usage for 30 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/paperless.md"
    - name: homelab.proxmox
      rules:
        - alert: HomelabProxmoxExporterDown
          expr: up{job="proxmox-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Proxmox exporter scrape target is down"
            description: "Prometheus cannot scrape the Proxmox exporter target {{ $labels.instance }}."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#proxmox-metrics"
        - alert: HomelabProxmoxNodeDown
          expr: max by (id) (pve_up{id=~"node/(latios|latias|rayquaza)"}) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Proxmox node {{ $labels.id }} is down"
            description: "The Proxmox exporter reports {{ $labels.id }} as offline."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#proxmox-metrics"
        - alert: HomelabProxmoxExpectedGuestDown
          expr: max by (id) (pve_up{id=~"(qemu|lxc)/.*"}) == 0 and on (id) max by (id) (pve_onboot_status == 1)
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Expected Proxmox guest {{ $labels.id }} is down"
            description: "The Proxmox guest {{ $labels.id }} is marked on-boot but is not running."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#proxmox-metrics"
        - alert: HomelabProxmoxStorageFillingUp
          expr: max by (id) (pve_disk_usage_bytes{id=~"storage/.*"} / pve_disk_size_bytes{id=~"storage/.*"}) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Proxmox storage {{ $labels.id }} is over 85% full"
            description: "The Proxmox storage {{ $labels.id }} has been above 85% usage for 15 minutes."
            runbook_url: "https://github.com/michaelmcnees/homelab/blob/main/docs/runbooks/observability.md#proxmox-metrics"
