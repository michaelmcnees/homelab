apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: household-hosts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  jobName: household_compute
  scrapeInterval: 30s
  scrapeTimeout: 15s
  metricsPath: /metrics
  staticConfigs:
    # Add a target per host onboarded by the ansible host-monitoring role.
    # Prefer tailnet hostnames when available. LAN-only clients can use stable
    # DHCP reservations as long as the cluster can route to that subnet.
    # Example:
    # - targets:
    #     - "michael-mbp.tail-scale.ts.net:9100"
    #     - "mac-studio.tail-scale.ts.net:9100"
    #   labels:
    #     household_role: workstation
    #     household_infra: "false"
    - targets:
        - "10.0.30.183:9100"
      labels:
        household_role: signage
        household_infra: "true"
        host: rotom
    - targets:
        - "10.0.20.98:9100"
      labels:
        household_role: personal_desktop
        household_infra: "false"
        host: lucas-minimint
  relabelings:
    - sourceLabels: [host]
      targetLabel: instance
      regex: '(.+)'
      replacement: '$1'
