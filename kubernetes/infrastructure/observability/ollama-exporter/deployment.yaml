apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: ollama-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-exporter
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: python:3.13.3-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/exporter.py
          env:
            - name: OLLAMA_URL
              value: http://ollama.apps.svc.cluster.local:11434
          ports:
            - name: http
              containerPort: 9394
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: ollama-exporter
        - name: tmp
          emptyDir: {}
