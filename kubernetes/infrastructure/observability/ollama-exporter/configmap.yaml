apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-exporter
  namespace: observability
data:
  exporter.py: |
    import json
    import os
    import time
    import urllib.request
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    OLLAMA_URL = os.environ.get("OLLAMA_URL", "http://ollama.apps.svc.cluster.local:11434").rstrip("/")

    def labels(values):
        pairs = []
        for key, value in values.items():
            escaped = str(value).replace("\\", "\\\\").replace('"', '\\"')
            pairs.append(f'{key}="{escaped}"')
        return ",".join(pairs)

    def fetch_json(path):
        with urllib.request.urlopen(f"{OLLAMA_URL}{path}", timeout=5) as response:
            return json.loads(response.read().decode("utf-8"))

    def parse_time(value):
        if not value:
            return 0
        return datetime.fromisoformat(value.replace("Z", "+00:00")).timestamp()

    def collect_metrics():
        lines = [
            "# HELP ollama_exporter_up Whether the exporter can reach Ollama.",
            "# TYPE ollama_exporter_up gauge",
        ]

        try:
            ps = fetch_json("/api/ps")
            tags = fetch_json("/api/tags")
            lines.append("ollama_exporter_up 1")
        except Exception as exc:
            lines.append("ollama_exporter_up 0")
            lines.append(f'ollama_exporter_last_error{{error="{str(exc).replace(chr(34), chr(39))}"}} 1')
            return "\n".join(lines) + "\n"

        loaded = {model.get("model") or model.get("name"): model for model in ps.get("models", [])}

        lines.extend([
            "# HELP ollama_model_loaded_info Loaded Ollama model metadata.",
            "# TYPE ollama_model_loaded_info gauge",
            "# HELP ollama_model_size_bytes Loaded Ollama model memory footprint.",
            "# TYPE ollama_model_size_bytes gauge",
            "# HELP ollama_model_context_length Loaded Ollama model context length.",
            "# TYPE ollama_model_context_length gauge",
            "# HELP ollama_model_expires_at_seconds Unix timestamp when the loaded model expires from memory.",
            "# TYPE ollama_model_expires_at_seconds gauge",
            "# HELP ollama_model_available_info Available Ollama model metadata.",
            "# TYPE ollama_model_available_info gauge",
        ])

        now = int(time.time())
        for name, model in loaded.items():
            detail = model.get("details", {})
            base = {
                "model": name,
                "family": detail.get("family", "unknown"),
                "parameters": detail.get("parameter_size", "unknown"),
                "quantization": detail.get("quantization_level", "unknown"),
            }
            lines.append(f"ollama_model_loaded_info{{{labels(base)}}} 1")
            lines.append(f"ollama_model_size_bytes{{{labels({'model': name})}}} {int(model.get('size') or 0)}")
            lines.append(f"ollama_model_context_length{{{labels({'model': name})}}} {int(model.get('context_length') or 0)}")
            lines.append(f"ollama_model_expires_at_seconds{{{labels({'model': name})}}} {int(parse_time(model.get('expires_at')))}")

        for model in tags.get("models", []):
            detail = model.get("details", {})
            name = model.get("model") or model.get("name")
            lines.append(f"ollama_model_available_info{{{labels({'model': name, 'family': detail.get('family', 'unknown'), 'parameters': detail.get('parameter_size', 'unknown'), 'quantization': detail.get('quantization_level', 'unknown')})}}} 1")

        lines.append(f"ollama_exporter_scrape_timestamp_seconds {now}")
        return "\n".join(lines) + "\n"

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return
            body = collect_metrics().encode("utf-8")
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *_):
            return

    ThreadingHTTPServer(("0.0.0.0", 9394), Handler).serve_forever()
