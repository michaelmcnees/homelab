apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: version-checker
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: version-checker
      version: "0.10.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    versionChecker:
      imageCacheTimeout: 2h
      logLevel: info
      testAllContainers: true
    serviceMonitor:
      enabled: true
    dashboards:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
