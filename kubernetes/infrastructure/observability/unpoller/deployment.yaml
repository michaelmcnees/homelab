apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpoller
  namespace: observability
  labels:
    app.kubernetes.io/name: unpoller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unpoller
    spec:
      enableServiceLinks: false
      priorityClassName: standard
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unpoller
          image: ghcr.io/unpoller/unpoller:v2.16.0
          imagePullPolicy: IfNotPresent
          env:
            - name: UP_POLLER_QUIET
              value: "false"
            - name: UP_PROMETHEUS_DISABLE
              value: "false"
            - name: UP_PROMETHEUS_HTTP_LISTEN
              value: 0.0.0.0:9130
            - name: UP_INFLUXDB_DISABLE
              value: "true"
            - name: UP_LOKI_DISABLE
              value: "true"
            - name: UP_UNIFI_DEFAULT_URL
              value: https://10.0.0.17
            - name: UP_UNIFI_DEFAULT_VERIFY_SSL
              value: "false"
            - name: UP_UNIFI_DEFAULT_SITE_0
              value: default
            - name: UP_UNIFI_DEFAULT_SAVE_SITES
              value: "true"
            - name: UP_UNIFI_DEFAULT_SAVE_DPI
              value: "true"
            - name: UP_UNIFI_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: unpoller-secret
                  key: UP_UNIFI_DEFAULT_USER
            - name: UP_UNIFI_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: unpoller-secret
                  key: UP_UNIFI_DEFAULT_PASS
          ports:
            - name: http
              containerPort: 9130
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 60
            periodSeconds: 60
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
