apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: media
  labels:
    app.kubernetes.io/name: lidarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lidarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lidarr
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lidarr
          image: ghcr.io/linuxserver/lidarr:3.1.0.4875-ls24
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8686
              protocol: TCP
          env:
            - name: TZ
              value: America/Detroit
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: UMASK
              value: "002"
            - name: LIDARR__AUTH__METHOD
              value: External
            - name: LIDARR__AUTH__REQUIRED
              value: DisabledForLocalAddresses
            - name: LIDARR__POSTGRES__HOST
              value: metagross.internal.svc.cluster.local
            - name: LIDARR__POSTGRES__PORT
              value: "5432"
            - name: LIDARR__POSTGRES__USER
              value: lidarr
            - name: LIDARR__POSTGRES__MAINDB
              value: lidarr_main
            - name: LIDARR__POSTGRES__LOGDB
              value: lidarr_log
            - name: LIDARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lidarr-secrets
                  key: LIDARR__POSTGRES__PASSWORD
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 1536Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: lidarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media-library
