apiVersion: apps/v1
kind: Deployment
metadata:
  name: wizarr
  namespace: media
  labels:
    app.kubernetes.io/name: wizarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wizarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wizarr
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wizarr
          image: ghcr.io/wizarrrr/wizarr:v2025.11.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5690
              protocol: TCP
          env:
            - name: TZ
              value: America/Detroit
            - name: APP_URL
              value: https://invitations.mcnees.me
            - name: DISABLE_BUILTIN_AUTH
              value: "false"
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wizarr-data
