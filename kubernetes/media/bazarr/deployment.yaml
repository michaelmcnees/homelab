apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: media
  labels:
    app.kubernetes.io/name: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bazarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bazarr
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bazarr
          image: ghcr.io/linuxserver/bazarr:v1.5.5-ls335
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 6767
              protocol: TCP
          env:
            - name: TZ
              value: America/Detroit
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: UMASK
              value: "002"
            - name: POSTGRES_ENABLED
              value: "true"
            - name: POSTGRES_HOST
              value: metagross.internal.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DATABASE
              value: bazarr
            - name: POSTGRES_USERNAME
              value: bazarr
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bazarr-secrets
                  key: POSTGRES_PASSWORD
            - name: PGSSLCERT
              value: /tmp/postgresql.crt
          readinessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: media
          persistentVolumeClaim:
            claimName: media-library
