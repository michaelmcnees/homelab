# onedr0p/exportarr Deployments per *arr instance.
# Each Deployment+Service has labels:
#   app.kubernetes.io/name: exportarr
#   app.kubernetes.io/component: exportarr           # used by the ServiceMonitor selector
#   app.kubernetes.io/instance: <unique>             # per-app
#   app.kubernetes.io/part-of: <upstream-arr>        # for dashboard grouping

# ---------------- sonarr ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exportarr-sonarr
  namespace: media
  labels:
    app.kubernetes.io/name: exportarr
    app.kubernetes.io/component: exportarr
    app.kubernetes.io/instance: exportarr-sonarr
    app.kubernetes.io/part-of: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: exportarr-sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exportarr
        app.kubernetes.io/component: exportarr
        app.kubernetes.io/instance: exportarr-sonarr
        app.kubernetes.io/part-of: sonarr
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.2.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args: ["sonarr"]
          env:
            - { name: PORT, value: "9707" }
            - { name: URL, value: "http://sonarr.media.svc.cluster.local:8989" }
            - { name: ENABLE_ADDITIONAL_METRICS, value: "true" }
            - { name: ENABLE_UNKNOWN_QUEUE_ITEMS, value: "true" }
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-exporter-keys
                  key: SONARR_API_KEY
          ports:
            - { name: http, containerPort: 9707 }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 96Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: exportarr-sonarr
  namespace: media
  labels:
    app.kubernetes.io/name: exportarr
    app.kubernetes.io/component: exportarr
    app.kubernetes.io/instance: exportarr-sonarr
    app.kubernetes.io/part-of: sonarr
spec:
  selector:
    app.kubernetes.io/instance: exportarr-sonarr
  ports:
    - { name: http, port: 9707, targetPort: http }
