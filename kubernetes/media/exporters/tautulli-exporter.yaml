apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli-exporter
  namespace: media
  labels:
    app.kubernetes.io/name: tautulli-exporter
    app.kubernetes.io/component: tautulli-exporter
    app.kubernetes.io/part-of: tautulli
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tautulli-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tautulli-exporter
        app.kubernetes.io/component: tautulli-exporter
        app.kubernetes.io/part-of: tautulli
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: mm404/tautulli-exporter:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: TAUTULLI_URL
              value: http://tautulli.media.svc.cluster.local:8181
            - name: TAUTULLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-exporter-keys
                  key: TAUTULLI_API_KEY
            - name: METRICS_PORT
              value: "9713"
          ports:
            - name: http
              containerPort: 9713
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tautulli-exporter
  namespace: media
  labels:
    app.kubernetes.io/name: tautulli-exporter
    app.kubernetes.io/component: tautulli-exporter
    app.kubernetes.io/part-of: tautulli
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tautulli-exporter
  ports:
    - name: http
      port: 9713
      targetPort: http
      protocol: TCP
