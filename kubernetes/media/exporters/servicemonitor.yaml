apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: media-exporters
  namespace: media
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: exportarr
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 15s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tautulli-exporter
  namespace: media
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: tautulli-exporter
  endpoints:
    - port: http
      interval: 60s
      scrapeTimeout: 15s
      path: /metrics
