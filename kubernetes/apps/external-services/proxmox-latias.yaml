apiVersion: v1
kind: Service
metadata:
  name: proxmox-latias-external
  namespace: apps
spec:
  ports:
    - name: https
      port: 8006
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-latias-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.3.40
    ports:
      - name: https
        port: 8006
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox-latias
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`latias.home.mcnees.me`)
      kind: Rule
      services:
        - name: proxmox-latias-external
          port: 8006
          scheme: https
          serversTransport: proxmox-insecure
  tls:
    secretName: proxmox-latias-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: proxmox-latias
  namespace: apps
spec:
  secretName: proxmox-latias-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - latias.home.mcnees.me
