apiVersion: v1
kind: Service
metadata:
  name: plex-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 32400
      targetPort: 32400
---
apiVersion: v1
kind: Endpoints
metadata:
  name: plex-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.1
    ports:
      - name: http
        port: 32400
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`plex.home.mcnees.me`)
      kind: Rule
      services:
        - name: plex-external
          port: 32400
  tls:
    secretName: plex-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: plex
  namespace: apps
spec:
  secretName: plex-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - plex.home.mcnees.me
