apiVersion: v1
kind: Service
metadata:
  name: overseer-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 5055
      targetPort: 5055
---
apiVersion: v1
kind: Endpoints
metadata:
  name: overseer-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.58
    ports:
      - name: http
        port: 5055
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: overseer
  namespace: apps
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`requests.mcnees.me`)
      kind: Rule
      services:
        - name: overseer-external
          port: 5055
  tls:
    secretName: legacy-public-wildcard-tls
