apiVersion: v1
kind: Service
metadata:
  name: lazylibrarian-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 5299
      targetPort: 5299
---
apiVersion: v1
kind: Endpoints
metadata:
  name: lazylibrarian-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.62
    ports:
      - name: http
        port: 5299
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lazylibrarian
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lazylibrarian.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: lazylibrarian-external
          port: 5299
  tls:
    secretName: legacy-home-wildcard-tls
