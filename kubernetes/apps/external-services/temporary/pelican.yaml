apiVersion: v1
kind: Service
metadata:
  name: pelican-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pelican-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.63
    ports:
      - name: http
        port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pelican
  namespace: apps
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`pelican.mcnees.me`)
      kind: Rule
      middlewares:
        - name: public-chain
          namespace: infrastructure
      services:
        - name: pelican-external
          port: 80
  tls:
    secretName: legacy-public-wildcard-tls
