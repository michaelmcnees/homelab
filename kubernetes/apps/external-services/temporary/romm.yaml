apiVersion: v1
kind: Service
metadata:
  name: romm-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 31100
      targetPort: 31100
---
apiVersion: v1
kind: Endpoints
metadata:
  name: romm-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.1
    ports:
      - name: http
        port: 31100
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: romm
  namespace: apps
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`arcade.mcnees.me`)
      kind: Rule
      services:
        - name: romm-external
          port: 31100
  tls:
    secretName: legacy-public-wildcard-tls
