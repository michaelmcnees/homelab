apiVersion: v1
kind: Service
metadata:
  name: openwebui-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openwebui-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.57
    ports:
      - name: http
        port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ai.home.mcnees.me`)
      kind: Rule
      services:
        - name: openwebui-external
          port: 8080
  tls:
    secretName: legacy-home-wildcard-tls
