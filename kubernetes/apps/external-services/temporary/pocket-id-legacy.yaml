apiVersion: v1
kind: Service
metadata:
  name: pocket-id-legacy-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 1411
      targetPort: 1411
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pocket-id-legacy-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.20
    ports:
      - name: http
        port: 1411
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id-legacy
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`legacy-id.home.mcnees.me`)
      kind: Rule
      services:
        - name: pocket-id-legacy-external
          port: 1411
  tls:
    secretName: legacy-home-wildcard-tls
