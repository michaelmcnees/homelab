apiVersion: v1
kind: Service
metadata:
  name: n8n-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 5678
      targetPort: 5678
---
apiVersion: v1
kind: Endpoints
metadata:
  name: n8n-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.55
    ports:
      - name: http
        port: 5678
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.home.mcnees.me`)
      kind: Rule
      services:
        - name: n8n-external
          port: 5678
  tls:
    secretName: legacy-home-wildcard-tls
