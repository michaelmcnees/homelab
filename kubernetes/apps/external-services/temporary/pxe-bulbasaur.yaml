apiVersion: v1
kind: Service
metadata:
  name: pxe-bulbasaur-external
  namespace: apps
spec:
  ports:
    - name: https
      port: 8006
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pxe-bulbasaur-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.2.0
    ports:
      - name: https
        port: 8006
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pxe-bulbasaur
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pxe-bulbasaur.home.mcnees.me`)
      kind: Rule
      services:
        - name: pxe-bulbasaur-external
          port: 8006
          scheme: https
          serversTransport: proxmox-insecure
  tls:
    secretName: legacy-home-wildcard-tls
