apiVersion: v1
kind: Service
metadata:
  name: sonarr-anime-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 8990
      targetPort: 8990
---
apiVersion: v1
kind: Endpoints
metadata:
  name: sonarr-anime-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.40
    ports:
      - name: http
        port: 8990
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr-anime
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr-anime.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: sonarr-anime-external
          port: 8990
  tls:
    secretName: legacy-home-wildcard-tls
