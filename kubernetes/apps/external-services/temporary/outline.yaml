apiVersion: v1
kind: Service
metadata:
  name: outline-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: outline-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.0.23
    ports:
      - name: http
        port: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: outline
  namespace: apps
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`docs.mcnees.me`)
      kind: Rule
      middlewares:
        - name: public-chain
          namespace: infrastructure
      services:
        - name: outline-external
          port: 3000
  tls:
    secretName: legacy-public-wildcard-tls
