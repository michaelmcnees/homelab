apiVersion: v1
kind: Service
metadata:
  name: pterodactyl-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pterodactyl-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.2.19
    ports:
      - name: http
        port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pterodactyl
  namespace: apps
spec:
  entryPoints:
    - websecure-external
  routes:
    - match: Host(`pterodactyl.mcnees.me`)
      kind: Rule
      services:
        - name: pterodactyl-external
          port: 80
  tls:
    secretName: legacy-public-wildcard-tls
