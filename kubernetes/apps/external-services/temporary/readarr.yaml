apiVersion: v1
kind: Service
metadata:
  name: readarr-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 30045
      targetPort: 30045
---
apiVersion: v1
kind: Endpoints
metadata:
  name: readarr-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.1
    ports:
      - name: http
        port: 30045
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: readarr
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`readarr.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: readarr-external
          port: 30045
  tls:
    secretName: legacy-home-wildcard-tls
