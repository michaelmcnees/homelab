apiVersion: v1
kind: Service
metadata:
  name: lidarr-kids-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 8687
      targetPort: 8687
---
apiVersion: v1
kind: Endpoints
metadata:
  name: lidarr-kids-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.40
    ports:
      - name: http
        port: 8687
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lidarr-kids
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lidarr-kids.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: lidarr-kids-external
          port: 8687
  tls:
    secretName: legacy-home-wildcard-tls
