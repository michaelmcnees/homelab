apiVersion: v1
kind: Service
metadata:
  name: sabnzbd-external
  namespace: apps
spec:
  ports:
    - name: http
      port: 30055
      targetPort: 30055
---
apiVersion: v1
kind: Endpoints
metadata:
  name: sabnzbd-external
  namespace: apps
subsets:
  - addresses:
      - ip: 10.0.1.1
    ports:
      - name: http
        port: 30055
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sabnzbd
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sabnzbd.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: sabnzbd-external
          port: 30055
  tls:
    secretName: sabnzbd-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sabnzbd
  namespace: apps
spec:
  secretName: sabnzbd-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - sabnzbd.home.mcnees.me
