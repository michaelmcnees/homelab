apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mantle
  namespace: apps
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mantle
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
