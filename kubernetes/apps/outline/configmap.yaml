apiVersion: v1
kind: ConfigMap
metadata:
  name: outline-config
  namespace: apps
data:
  NODE_ENV: production
  URL: https://docs.mcnees.me
  PORT: "3000"
  FORCE_HTTPS: "false"
  WEB_CONCURRENCY: "1"
  PGSSLMODE: disable
  REDIS_URL: redis://redis-master.databases.svc.cluster.local:6379/4
  FILE_STORAGE: s3
  FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
  AWS_REGION: us-east-1
  AWS_S3_UPLOAD_BUCKET_NAME: outline
  AWS_S3_UPLOAD_BUCKET_URL: http://rustfs.object-storage.svc.cluster.local:9000
  AWS_S3_FORCE_PATH_STYLE: "true"
  AWS_S3_ACL: private
  OIDC_DISPLAY_NAME: McNees ID
  OIDC_AUTH_URI: https://id.mcnees.me/authorize
  OIDC_TOKEN_URI: https://id.mcnees.me/api/oidc/token
  OIDC_USERINFO_URI: https://id.mcnees.me/api/oidc/userinfo
  OIDC_LOGOUT_URI: https://id.mcnees.me/api/oidc/end-session
  OIDC_SCOPES: openid profile email groups
  OIDC_USERNAME_CLAIM: preferred_username
  ENABLE_UPDATES: "false"
  LOG_LEVEL: info
