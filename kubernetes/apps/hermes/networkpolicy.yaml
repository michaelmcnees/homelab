apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-ingress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hermes
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infrastructure
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9119
