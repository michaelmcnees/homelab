apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: apps
data:
  config.yaml: |
    model:
      provider: openai-codex
      default: gpt-5.3-codex
    mcp_servers:
      honeydew:
        url: https://mcp.honeydewdone.app
        auth: oauth
      outline:
        url: https://docs.mcnees.me/mcp
        auth: oauth
