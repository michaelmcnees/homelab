apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: apps
data:
  config.yaml: |
    model:
      provider: openai-codex
      default: gpt-5.5
    network:
      force_ipv4: true
    mcp_servers:
      outline:
        url: https://docs.mcnees.me/mcp
        auth: oauth
        enabled: true
      gmail:
        url: https://toolhive.home.mcnees.me/mcp
        auth: oauth
        enabled: true
