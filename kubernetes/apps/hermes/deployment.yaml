apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: apps
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10000:10000 /opt/data && find /workspace -xdev -not -path /workspace/obsidian -exec chown 10000:10000 {} +
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DATA_DIR
              value: /opt/data
            - name: HERMES_WORKSPACE_DIR
              value: /workspace
            - name: OLLAMA_BASE_URL
              value: http://ollama.apps.svc.cluster.local:11434
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENROUTER_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENAI_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: XAI_API_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OLLAMA_API_KEY
            - name: EMAIL_IMAP_HOST
              value: imap.mail.me.com
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_IMAP_USER
              value: michael@mcnees.me
            - name: EMAIL_IMAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: EMAIL_SMTP_HOST
              value: smtp.mail.me.com
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: EMAIL_SMTP_USER
              value: michael@mcnees.me
            - name: EMAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: EMAIL_SMTP_TLS
              value: "true"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_ALLOWED_USERS
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
      volumes:
        - name: config
          configMap:
            name: hermes-config
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: workspace
          persistentVolumeClaim:
            claimName: hermes-workspace
        - name: obsidian-vault
          persistentVolumeClaim:
            claimName: obsidian-vault
