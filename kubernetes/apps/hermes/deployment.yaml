apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: apps
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10000:10000 /opt/data && find /workspace -xdev -not -path /workspace/obsidian -exec chown 10000:10000 {} +
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
        - name: inject-email-config
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              ENV_FILE=/opt/data/.env
              sed -i '/^EMAIL_ADDRESS=/d;/^EMAIL_PASSWORD=/d;/^EMAIL_IMAP_HOST=/d;/^EMAIL_IMAP_PORT=/d;/^EMAIL_SMTP_HOST=/d;/^EMAIL_SMTP_PORT=/d;/^EMAIL_POLL_INTERVAL=/d;/^EMAIL_ALLOWED_USERS=/d;/^EMAIL_HOME_ADDRESS=/d;/^CALDAV_URL=/d;/^CALDAV_USER=/d;/^CALDAV_PASSWORD=/d' "$ENV_FILE"
              printf '\nEMAIL_ADDRESS=%s\nEMAIL_PASSWORD=%s\nEMAIL_IMAP_HOST=%s\nEMAIL_IMAP_PORT=%s\nEMAIL_SMTP_HOST=%s\nEMAIL_SMTP_PORT=%s\nEMAIL_POLL_INTERVAL=15\nEMAIL_ALLOWED_USERS=%s\nEMAIL_HOME_ADDRESS=%s\nCALDAV_URL=%s\nCALDAV_USER=%s\nCALDAV_PASSWORD=%s\n' \
                "$EMAIL_ADDRESS" "$EMAIL_PASSWORD" "$EMAIL_IMAP_HOST" "$EMAIL_IMAP_PORT" \
                "$EMAIL_SMTP_HOST" "$EMAIL_SMTP_PORT" "$EMAIL_HOME" "$EMAIL_HOME" \
                "$CALDAV_URL" "$CALDAV_USER" "$CALDAV_PASSWORD" \
                >> "$ENV_FILE"
          env:
            - name: EMAIL_ADDRESS
              value: mcnees.michael@icloud.com
            - name: EMAIL_HOME
              value: michael@mcnees.me
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: EMAIL_IMAP_HOST
              value: imap.mail.me.com
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_SMTP_HOST
              value: smtp.mail.me.com
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: CALDAV_URL
              value: https://caldav.icloud.com/
            - name: CALDAV_USER
              value: mcnees.michael@icloud.com
            - name: CALDAV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
          securityContext:
            runAsUser: 10000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DATA_DIR
              value: /opt/data
            - name: HERMES_WORKSPACE_DIR
              value: /workspace
            - name: OLLAMA_BASE_URL
              value: http://ollama.apps.svc.cluster.local:11434
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENROUTER_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENAI_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: XAI_API_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OLLAMA_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_ALLOWED_USERS
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
      volumes:
        - name: config
          configMap:
            name: hermes-config
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: workspace
          persistentVolumeClaim:
            claimName: hermes-workspace
        - name: obsidian-vault
          persistentVolumeClaim:
            claimName: obsidian-vault
