apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: apps
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        hermes.mcnees.me/config-revision: gpt-5.5-outline-toolhive-agent-tools-runtime
      labels:
        app.kubernetes.io/name: hermes
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10000:10000 /opt/data /workspace
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: workspace
              mountPath: /workspace
        - name: install-hermes-cli-shim
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/home/.local/bin
              ln -sfn /opt/hermes/.venv/bin/hermes /opt/data/home/.local/bin/hermes
              chown -R 10000:10000 /opt/data/home/.local
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
        - name: inject-icloud-config
          image: curlimages/curl:8.13.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              ENV_FILE=/opt/data/.env
              sed -i '/^EMAIL_ADDRESS=/d;/^EMAIL_PASSWORD=/d;/^EMAIL_IMAP_HOST=/d;/^EMAIL_IMAP_PORT=/d;/^EMAIL_SMTP_HOST=/d;/^EMAIL_SMTP_PORT=/d;/^EMAIL_POLL_INTERVAL=/d;/^EMAIL_ALLOWED_USERS=/d;/^EMAIL_HOME_ADDRESS=/d;/^CALDAV_URL=/d;/^CALDAV_USER=/d;/^CALDAV_PASSWORD=/d' "$ENV_FILE"
              printf '\nCALDAV_URL=%s\nCALDAV_USER=%s\nCALDAV_PASSWORD=%s\n' \
                "$CALDAV_URL" "$CALDAV_USER" "$CALDAV_PASSWORD" \
                >> "$ENV_FILE"
              HCONFIG=/opt/data/home/.config/himalaya/config.toml
              mkdir -p /opt/data/home/.config/himalaya
              umask 077
              printf '%s\n' \
                "[accounts.icloud]" \
                "email = \"$EMAIL_HOME\"" \
                "display-name = \"Michael McNees\"" \
                "default = true" \
                "backend.type = \"imap\"" \
                "backend.host = \"$EMAIL_IMAP_HOST\"" \
                "backend.port = $EMAIL_IMAP_PORT" \
                "backend.encryption.type = \"tls\"" \
                "backend.login = \"$ICLOUD_USER\"" \
                "backend.auth.type = \"password\"" \
                "backend.auth.raw = \"$ICLOUD_PASSWORD\"" \
                "message.send.backend.type = \"smtp\"" \
                "message.send.backend.host = \"$EMAIL_SMTP_HOST\"" \
                "message.send.backend.port = $EMAIL_SMTP_PORT" \
                "message.send.backend.encryption.type = \"start-tls\"" \
                "message.send.backend.login = \"$ICLOUD_USER\"" \
                "message.send.backend.auth.type = \"password\"" \
                "message.send.backend.auth.raw = \"$ICLOUD_PASSWORD\"" \
                "folder.aliases.inbox = \"INBOX\"" \
                "folder.aliases.sent = \"Sent Messages\"" \
                "folder.aliases.drafts = \"Drafts\"" \
                "folder.aliases.trash = \"Deleted Messages\"" \
                "" \
                "[accounts.gmail]" \
                "email = \"$GMAIL_USER\"" \
                "display-name = \"Michael McNees\"" \
                "backend.type = \"imap\"" \
                "backend.host = \"imap.gmail.com\"" \
                "backend.port = 993" \
                "backend.encryption.type = \"tls\"" \
                "backend.login = \"$GMAIL_USER\"" \
                "backend.auth.type = \"password\"" \
                "backend.auth.raw = \"$GMAIL_PASSWORD\"" \
                "message.send.backend.type = \"smtp\"" \
                "message.send.backend.host = \"smtp.gmail.com\"" \
                "message.send.backend.port = 465" \
                "message.send.backend.encryption.type = \"tls\"" \
                "message.send.backend.login = \"$GMAIL_USER\"" \
                "message.send.backend.auth.type = \"password\"" \
                "message.send.backend.auth.raw = \"$GMAIL_PASSWORD\"" \
                "folder.aliases.inbox = \"INBOX\"" \
                "folder.aliases.sent = \"[Gmail]/Sent Mail\"" \
                "folder.aliases.drafts = \"[Gmail]/Drafts\"" \
                "folder.aliases.trash = \"[Gmail]/Trash\"" \
                > "$HCONFIG"
              chmod 600 "$HCONFIG"
              if [ ! -f /opt/data/.local/bin/himalaya ]; then
                mkdir -p /opt/data/.local/bin
                curl -sSL https://github.com/pimalaya/himalaya/releases/latest/download/himalaya.x86_64-linux.tgz | tar xz -C /opt/data/.local/bin/
                chmod +x /opt/data/.local/bin/himalaya
              fi
              if [ ! -f /opt/data/.local/bin/gh ]; then
                GH_URL=$(curl -sL https://api.github.com/repos/cli/cli/releases/latest | grep -o '"browser_download_url": "[^"]*linux_amd64.tar.gz"' | cut -d'"' -f4)
                mkdir -p /tmp/gh-install
                curl -sSL "$GH_URL" | tar xz -C /tmp/gh-install/
                cp /tmp/gh-install/*/bin/gh /opt/data/.local/bin/gh
                chmod +x /opt/data/.local/bin/gh
                rm -rf /tmp/gh-install
              fi
              export HOME=/opt/data/home
              GH_TOK="$GH_TOKEN"
              unset GH_TOKEN
              echo "$GH_TOK" | /opt/data/.local/bin/gh auth login --with-token
          env:
            - name: ICLOUD_USER
              value: mcnees.michael@icloud.com
            - name: ICLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: EMAIL_HOME
              value: michael@mcnees.me
            - name: EMAIL_IMAP_HOST
              value: imap.mail.me.com
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_SMTP_HOST
              value: smtp.mail.me.com
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: GMAIL_USER
              value: mcnees.michael@gmail.com
            - name: GMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: GMAIL_APP_PASSWORD
            - name: CALDAV_URL
              value: https://caldav.icloud.com/
            - name: CALDAV_USER
              value: mcnees.michael@icloud.com
            - name: CALDAV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: GH_TOKEN
          securityContext:
            runAsUser: 10000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:5731e3f580a850e0810605b27c61198cc43288bd7fefccf1168f386487683c5f
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - |
              chown 10000:10000 /opt/data/auth.json /opt/data/auth.json.corrupt 2>/dev/null || true
              chmod 600 /opt/data/auth.json /opt/data/auth.json.corrupt 2>/dev/null || true
              /opt/hermes/.venv/bin/python - <<'PY'
              from pathlib import Path

              path = Path("/opt/hermes/run_agent.py")
              text = path.read_text(encoding="utf-8")
              marker = "Codex SDK None-output stream hotfix"
              old = "\n".join([
                  "            except RuntimeError as exc:",
                  "                err_text = str(exc)",
              ]) + "\n"
              new = "\n".join([
                  "            except TypeError as exc:",
                  "                err_text = str(exc)",
                  "                if \"'NoneType' object is not iterable\" in err_text:",
                  "                    # Codex SDK None-output stream hotfix:",
                  "                    # chatgpt.com/backend-api/codex can emit response.completed",
                  "                    # with response.output=None after it has already streamed",
                  "                    # response.output_item.done events. openai==2.33.0 raises",
                  "                    # while parsing that terminal event, before Hermes can call",
                  "                    # get_final_response(). Preserve the collected stream output",
                  "                    # so Telegram and cron callers receive the answer.",
                  "                    if collected_output_items:",
                  "                        logger.warning(",
                  "                            \"Codex stream SDK raised TypeError on terminal output=None; \"",
                  "                            \"synthesizing response from %d collected output item(s). %s\",",
                  "                            len(collected_output_items),",
                  "                            self._client_log_context(),",
                  "                        )",
                  "                        return SimpleNamespace(",
                  "                            output=list(collected_output_items),",
                  "                            output_text=\"\".join(self._codex_streamed_text_parts),",
                  "                            status=\"completed\",",
                  "                        )",
                  "                    if self._codex_streamed_text_parts and not has_tool_calls:",
                  "                        assembled = \"\".join(self._codex_streamed_text_parts)",
                  "                        logger.warning(",
                  "                            \"Codex stream SDK raised TypeError on terminal output=None; \"",
                  "                            \"synthesizing response from %d text delta(s). %s\",",
                  "                            len(self._codex_streamed_text_parts),",
                  "                            self._client_log_context(),",
                  "                        )",
                  "                        return SimpleNamespace(",
                  "                            output=[SimpleNamespace(",
                  "                                type=\"message\",",
                  "                                role=\"assistant\",",
                  "                                status=\"completed\",",
                  "                                content=[SimpleNamespace(type=\"output_text\", text=assembled)],",
                  "                            )],",
                  "                            output_text=assembled,",
                  "                            status=\"completed\",",
                  "                        )",
                  "                raise",
                  "            except RuntimeError as exc:",
                  "                err_text = str(exc)",
              ]) + "\n"
              if marker not in text:
                  if old not in text:
                      raise SystemExit("Hermes Codex stream hotfix anchor not found")
                  path.write_text(text.replace(old, new, 1), encoding="utf-8")
                  print("Applied Hermes Codex stream hotfix")
              else:
                  print("Hermes Codex stream hotfix already present")

              aux_path = Path("/opt/hermes/agent/auxiliary_client.py")
              aux_text = aux_path.read_text(encoding="utf-8")
              aux_marker = "Codex auxiliary None-output stream hotfix"
              aux_old = "\n".join([
                  "            with self._client.responses.stream(**resp_kwargs) as stream:",
                  "                for _event in stream:",
                  "                    _etype = getattr(_event, \"type\", \"\")",
                  "                    if _etype == \"response.output_item.done\":",
                  "                        _done = getattr(_event, \"item\", None)",
                  "                        if _done is not None:",
                  "                            collected_output_items.append(_done)",
                  "                    elif \"output_text.delta\" in _etype:",
                  "                        _delta = getattr(_event, \"delta\", \"\")",
                  "                        if _delta:",
                  "                            collected_text_deltas.append(_delta)",
                  "                    elif \"function_call\" in _etype:",
                  "                        has_function_calls = True",
                  "                final = stream.get_final_response()",
              ]) + "\n"
              aux_new = "\n".join([
                  "            try:",
                  "                with self._client.responses.stream(**resp_kwargs) as stream:",
                  "                    for _event in stream:",
                  "                        _etype = getattr(_event, \"type\", \"\")",
                  "                        if _etype == \"response.output_item.done\":",
                  "                            _done = getattr(_event, \"item\", None)",
                  "                            if _done is not None:",
                  "                                collected_output_items.append(_done)",
                  "                        elif \"output_text.delta\" in _etype:",
                  "                            _delta = getattr(_event, \"delta\", \"\")",
                  "                            if _delta:",
                  "                                collected_text_deltas.append(_delta)",
                  "                        elif \"function_call\" in _etype:",
                  "                            has_function_calls = True",
                  "                    final = stream.get_final_response()",
                  "            except TypeError as exc:",
                  "                err_text = str(exc)",
                  "                if \"'NoneType' object is not iterable\" not in err_text:",
                  "                    raise",
                  "                # Codex auxiliary None-output stream hotfix:",
                  "                # chatgpt.com/backend-api/codex may emit response.completed",
                  "                # with response.output=None after streaming usable output.",
                  "                # openai==2.33.0 raises while parsing that terminal event;",
                  "                # synthesize the final response from already-collected events.",
                  "                if collected_output_items:",
                  "                    final = SimpleNamespace(output=list(collected_output_items), usage=None)",
                  "                    logger.warning(",
                  "                        \"Codex auxiliary stream SDK raised TypeError on terminal output=None; \"",
                  "                        \"synthesizing response from %d collected output item(s)\",",
                  "                        len(collected_output_items),",
                  "                    )",
                  "                elif collected_text_deltas and not has_function_calls:",
                  "                    assembled = \"\".join(collected_text_deltas)",
                  "                    final = SimpleNamespace(",
                  "                        output=[SimpleNamespace(",
                  "                            type=\"message\", role=\"assistant\", status=\"completed\",",
                  "                            content=[SimpleNamespace(type=\"output_text\", text=assembled)],",
                  "                        )],",
                  "                        usage=None,",
                  "                    )",
                  "                    logger.warning(",
                  "                        \"Codex auxiliary stream SDK raised TypeError on terminal output=None; \"",
                  "                        \"synthesizing response from %d text delta(s)\",",
                  "                        len(collected_text_deltas),",
                  "                    )",
                  "                else:",
                  "                    raise",
              ]) + "\n"
              if aux_marker not in aux_text:
                  if aux_old not in aux_text:
                      raise SystemExit("Hermes auxiliary Codex stream hotfix anchor not found")
                  aux_path.write_text(aux_text.replace(aux_old, aux_new, 1), encoding="utf-8")
                  print("Applied Hermes auxiliary Codex stream hotfix")
              else:
                  print("Hermes auxiliary Codex stream hotfix already present")
              PY
              exec /opt/hermes/docker/entrypoint.sh gateway run
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HOME
              value: /opt/data/home
            - name: PATH
              value: /opt/hermes/.venv/bin:/opt/data/home/.local/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DATA_DIR
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_WORKSPACE_DIR
              value: /workspace
            - name: PYTHONPATH
              value: /opt/data/home/.local/lib/python3
            - name: TELEGRAM_FALLBACK_IPS
              value: 149.154.166.110,149.154.167.220
            - name: OLLAMA_BASE_URL
              value: http://ollama.apps.svc.cluster.local:11434
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENROUTER_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENAI_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: XAI_API_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OLLAMA_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_ALLOWED_USERS
            - name: TODOIST_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TODOIST_API_TOKEN
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: GH_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: GH_TOKEN
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: LINEAR_API_KEY
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: config
          configMap:
            name: hermes-config
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data-ceph
        - name: workspace
          persistentVolumeClaim:
            claimName: hermes-workspace-ceph
