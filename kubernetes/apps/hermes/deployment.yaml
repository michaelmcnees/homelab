apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: apps
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10000:10000 /opt/data && find /workspace -xdev -not -path /workspace/obsidian -exec chown 10000:10000 {} +
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
        - name: inject-icloud-config
          image: curlimages/curl:8.13.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              ENV_FILE=/opt/data/.env
              sed -i '/^EMAIL_ADDRESS=/d;/^EMAIL_PASSWORD=/d;/^EMAIL_IMAP_HOST=/d;/^EMAIL_IMAP_PORT=/d;/^EMAIL_SMTP_HOST=/d;/^EMAIL_SMTP_PORT=/d;/^EMAIL_POLL_INTERVAL=/d;/^EMAIL_ALLOWED_USERS=/d;/^EMAIL_HOME_ADDRESS=/d;/^CALDAV_URL=/d;/^CALDAV_USER=/d;/^CALDAV_PASSWORD=/d' "$ENV_FILE"
              printf '\nCALDAV_URL=%s\nCALDAV_USER=%s\nCALDAV_PASSWORD=%s\n' \
                "$CALDAV_URL" "$CALDAV_USER" "$CALDAV_PASSWORD" \
                >> "$ENV_FILE"
              HCONFIG=/opt/data/home/.config/himalaya/config.toml
              if [ ! -f "$HCONFIG" ]; then
                mkdir -p /opt/data/home/.config/himalaya
                printf '%s\n' \
                  "[accounts.icloud]" \
                  "email = \"$EMAIL_HOME\"" \
                  "display-name = \"Michael McNees\"" \
                  "default = true" \
                  "backend.type = \"imap\"" \
                  "backend.host = \"$EMAIL_IMAP_HOST\"" \
                  "backend.port = $EMAIL_IMAP_PORT" \
                  "backend.encryption.type = \"tls\"" \
                  "backend.login = \"$ICLOUD_USER\"" \
                  "backend.auth.type = \"password\"" \
                  "backend.auth.raw = \"$ICLOUD_PASSWORD\"" \
                  "message.send.backend.type = \"smtp\"" \
                  "message.send.backend.host = \"$EMAIL_SMTP_HOST\"" \
                  "message.send.backend.port = $EMAIL_SMTP_PORT" \
                  "message.send.backend.encryption.type = \"start-tls\"" \
                  "message.send.backend.login = \"$ICLOUD_USER\"" \
                  "message.send.backend.auth.type = \"password\"" \
                  "message.send.backend.auth.raw = \"$ICLOUD_PASSWORD\"" \
                  "folder.aliases.inbox = \"INBOX\"" \
                  "folder.aliases.sent = \"Sent Messages\"" \
                  "folder.aliases.drafts = \"Drafts\"" \
                  "folder.aliases.trash = \"Deleted Messages\"" \
                  > "$HCONFIG"
              fi
              if ! grep -q '\[accounts\.gmail\]' "$HCONFIG"; then
                printf '\n%s\n' \
                  "[accounts.gmail]" \
                  "email = \"$GMAIL_USER\"" \
                  "display-name = \"Michael McNees\"" \
                  "backend.type = \"imap\"" \
                  "backend.host = \"imap.gmail.com\"" \
                  "backend.port = 993" \
                  "backend.encryption.type = \"tls\"" \
                  "backend.login = \"$GMAIL_USER\"" \
                  "backend.auth.type = \"password\"" \
                  "backend.auth.raw = \"$GMAIL_PASSWORD\"" \
                  "message.send.backend.type = \"smtp\"" \
                  "message.send.backend.host = \"smtp.gmail.com\"" \
                  "message.send.backend.port = 465" \
                  "message.send.backend.encryption.type = \"tls\"" \
                  "message.send.backend.login = \"$GMAIL_USER\"" \
                  "message.send.backend.auth.type = \"password\"" \
                  "message.send.backend.auth.raw = \"$GMAIL_PASSWORD\"" \
                  "folder.aliases.inbox = \"INBOX\"" \
                  "folder.aliases.sent = \"[Gmail]/Sent Mail\"" \
                  "folder.aliases.drafts = \"[Gmail]/Drafts\"" \
                  "folder.aliases.trash = \"[Gmail]/Trash\"" \
                  >> "$HCONFIG"
              fi
              if [ ! -f /opt/data/.local/bin/himalaya ]; then
                mkdir -p /opt/data/.local/bin
                curl -sSL https://github.com/pimalaya/himalaya/releases/latest/download/himalaya.x86_64-linux.tgz | tar xz -C /opt/data/.local/bin/
                chmod +x /opt/data/.local/bin/himalaya
              fi
          env:
            - name: ICLOUD_USER
              value: mcnees.michael@icloud.com
            - name: ICLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
            - name: EMAIL_HOME
              value: michael@mcnees.me
            - name: EMAIL_IMAP_HOST
              value: imap.mail.me.com
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_SMTP_HOST
              value: smtp.mail.me.com
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: GMAIL_USER
              value: mcnees.michael@gmail.com
            - name: GMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: GMAIL_APP_PASSWORD
            - name: CALDAV_URL
              value: https://caldav.icloud.com/
            - name: CALDAV_USER
              value: mcnees.michael@icloud.com
            - name: CALDAV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: APPLE_APP_PASSWORD
          securityContext:
            runAsUser: 10000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DATA_DIR
              value: /opt/data
            - name: HERMES_WORKSPACE_DIR
              value: /workspace
            - name: PYTHONPATH
              value: /opt/data/home/.local/lib/python3
            - name: OLLAMA_BASE_URL
              value: http://ollama.apps.svc.cluster.local:11434
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENROUTER_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENAI_API_KEY
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: XAI_API_KEY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OLLAMA_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: TELEGRAM_ALLOWED_USERS
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: workspace
              mountPath: /workspace
            - name: obsidian-vault
              mountPath: /workspace/obsidian
      volumes:
        - name: config
          configMap:
            name: hermes-config
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: workspace
          persistentVolumeClaim:
            claimName: hermes-workspace
        - name: obsidian-vault
          persistentVolumeClaim:
            claimName: obsidian-vault
