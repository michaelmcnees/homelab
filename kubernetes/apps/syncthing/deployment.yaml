apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: apps
  labels:
    app.kubernetes.io/name: syncthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syncthing
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncthing
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10000:10000 /var/syncthing/config /var/syncthing/Sync
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /var/syncthing/config
            - name: vault
              mountPath: /var/syncthing/Sync
      containers:
        - name: syncthing
          image: syncthing/syncthing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: gui
              containerPort: 8384
              protocol: TCP
            - name: sync
              containerPort: 22000
              protocol: TCP
            - name: discovery
              containerPort: 21027
              protocol: UDP
          env:
            - name: STHOMEDIR
              value: /var/syncthing/config
            - name: STGUIADDRESS
              value: 0.0.0.0:8384
          readinessProbe:
            httpGet:
              path: /rest/noauth/health
              port: gui
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /rest/noauth/health
              port: gui
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /var/syncthing/config
            - name: vault
              mountPath: /var/syncthing/Sync
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: syncthing-config
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
