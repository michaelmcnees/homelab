apiVersion: apps/v1
kind: Deployment
metadata:
  name: pelican-panel
  namespace: apps
  labels:
    app.kubernetes.io/name: pelican-panel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pelican-panel
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pelican-panel
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - until nc -z metagross.internal.svc.cluster.local 5432; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: pelican-panel
          image: ghcr.io/pelican-dev/panel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pelican-panel-config
            - secretRef:
                name: pelican-panel-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: games.mcnees.me
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: games.mcnees.me
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /pelican-data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pelican-panel-data
