apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory-mariadb
  namespace: apps
  labels:
    app.kubernetes.io/name: grimmory-mariadb
    app.kubernetes.io/part-of: grimmory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grimmory-mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grimmory-mariadb
        app.kubernetes.io/part-of: grimmory
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Detroit
            - name: MYSQL_DATABASE
              value: grimmory
            - name: MYSQL_USER
              value: grimmory
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: grimmory-mariadb-config
---
apiVersion: v1
kind: Service
metadata:
  name: grimmory-mariadb
  namespace: apps
  labels:
    app.kubernetes.io/name: grimmory-mariadb
    app.kubernetes.io/part-of: grimmory
spec:
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
  selector:
    app.kubernetes.io/name: grimmory-mariadb
