apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  namespace: apps
  labels:
    app.kubernetes.io/name: grimmory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grimmory
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grimmory
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - until nc -z registeel.internal.svc.cluster.local 3306; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: grimmory
          image: ghcr.io/grimmory-tools/grimmory:v3.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6060
              protocol: TCP
          env:
            - name: USER_ID
              value: "568"
            - name: GROUP_ID
              value: "568"
            - name: TZ
              value: America/Detroit
            - name: DATABASE_URL
              value: jdbc:mariadb://registeel.internal.svc.cluster.local:3306/grimmory
            - name: DATABASE_USERNAME
              value: grimmory
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: DB_PASSWORD
            - name: API_DOCS_ENABLED
              value: "false"
            - name: DISK_TYPE
              value: NETWORK
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: books
              mountPath: /books
            - name: bookdrop
              mountPath: /bookdrop
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grimmory-data
        - name: books
          persistentVolumeClaim:
            claimName: grimmory-books
        - name: bookdrop
          persistentVolumeClaim:
            claimName: grimmory-bookdrop
