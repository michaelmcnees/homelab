apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: penpot
  namespace: apps
spec:
  interval: 30m
  dependsOn:
    - name: redis
      namespace: databases
  chart:
    spec:
      chart: penpot
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: penpot
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: penpot
    config:
      publicUri: https://design.mcnees.me
      flags: enable-registration enable-login-with-password disable-email-verification enable-log-emails enable-mcp
      existingSecret: penpot-secret
      secretKeys:
        apiSecretKey: PENPOT_SECRET_KEY
      telemetryEnabled: false
      postgresql:
        host: metagross.internal.svc.cluster.local
        port: 5432
        username: penpot
        database: penpot
        existingSecret: penpot-secret
        secretKeys:
          passwordKey: PENPOT_DATABASE_PASSWORD
      redis:
        host: redis-master.databases.svc.cluster.local
        port: 6379
        database: "5"
      objectsStorage:
        storageBackend: s3
        s3:
          region: us-east-1
          bucket: penpot
          endpointURI: http://rustfs.object-storage.svc.cluster.local:9000
          existingSecret: penpot-secret
          secretKeys:
            accessKeyIDKey: AWS_ACCESS_KEY_ID
            secretAccessKey: AWS_SECRET_ACCESS_KEY
      smtp:
        enabled: false
    backend:
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          memory: 2Gi
    frontend:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 768Mi
    exporter:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
    mcp:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
