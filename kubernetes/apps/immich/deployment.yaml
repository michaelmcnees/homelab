apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: apps
  labels:
    app.kubernetes.io/name: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - until nc -z immich-postgres 5432; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-valkey
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - until nc -z immich-valkey 6379; do sleep 3; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:v2.6.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 2283
              protocol: TCP
          env:
            - name: TZ
              value: America/Detroit
            - name: IMMICH_ENV
              value: production
            - name: IMMICH_TRUSTED_PROXIES
              value: 10.0.0.0/8
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning:3003
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_PASSWORD
            - name: DB_VECTOR_EXTENSION
              value: vectorchord
            - name: REDIS_HOSTNAME
              value: immich-valkey
            - name: REDIS_PORT
              value: "6379"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
              httpHeaders:
                - name: Host
                  value: photos.mcnees.me
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
              httpHeaders:
                - name: Host
                  value: photos.mcnees.me
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: library
              mountPath: /data
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: immich-library
