apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: apps
  labels:
    app.kubernetes.io/name: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-machine-learning
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-machine-learning
    spec:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v2.6.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: ml
              containerPort: 3003
              protocol: TCP
          env:
            - name: TZ
              value: America/Detroit
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: /cache
            - name: TRANSFORMERS_CACHE
              value: /cache
            - name: HF_XET_CACHE
              value: /cache/huggingface-xet
            - name: MPLCONFIGDIR
              value: /cache/matplotlib-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            tcpSocket:
              port: ml
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ml
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: immich-ml-cache
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: apps
  labels:
    app.kubernetes.io/name: immich-machine-learning
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: immich-machine-learning
  ports:
    - name: ml
      port: 3003
      targetPort: ml
      protocol: TCP
