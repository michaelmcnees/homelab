apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-gpt
  namespace: apps
  labels:
    app.kubernetes.io/name: paperless-gpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-gpt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-gpt
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: paperless-gpt
          image: icereed/paperless-gpt:v0.25.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PAPERLESS_BASE_URL
              value: http://paperless-ngx.apps.svc.cluster.local:8000
            - name: PAPERLESS_PUBLIC_URL
              value: https://paperless.home.mcnees.me
            - name: PAPERLESS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: paperless-gpt-secrets
                  key: PAPERLESS_API_TOKEN
            - name: MANUAL_TAG
              value: paperless-gpt
            - name: AUTO_TAG
              value: paperless-gpt-auto
            - name: LLM_PROVIDER
              value: ollama
            - name: LLM_MODEL
              value: granite4.1:3b
            - name: OLLAMA_HOST
              value: http://ollama.apps.svc.cluster.local:11434
            - name: OLLAMA_CONTEXT_LENGTH
              value: "4096"
            - name: TOKEN_LIMIT
              value: "500"
            - name: LLM_REQUESTS_PER_MINUTE
              value: "5"
            - name: OCR_PROVIDER
              value: llm
            - name: VISION_LLM_PROVIDER
              value: ollama
            - name: VISION_LLM_MODEL
              value: minicpm-v
            - name: OCR_PROCESS_MODE
              value: image
            - name: OCR_LIMIT_PAGES
              value: "5"
            - name: PDF_UPLOAD
              value: "false"
            - name: PDF_REPLACE
              value: "false"
            - name: PDF_COPY_METADATA
              value: "true"
            - name: PDF_OCR_TAGGING
              value: "true"
            - name: PDF_SKIP_EXISTING_OCR
              value: "true"
            - name: AUTO_GENERATE_TITLE
              value: "true"
            - name: AUTO_GENERATE_TAGS
              value: "true"
            - name: CREATE_NEW_TAGS
              value: "false"
            - name: AUTO_GENERATE_CORRESPONDENTS
              value: "true"
            - name: AUTO_GENERATE_DOCUMENT_TYPE
              value: "true"
            - name: LLM_LANGUAGE
              value: English
            - name: LOG_LEVEL
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: prompts
              mountPath: /app/prompts
      volumes:
        - name: prompts
          persistentVolumeClaim:
            claimName: paperless-gpt-prompts
