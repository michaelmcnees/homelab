apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-gpt
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`paperless-gpt.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: paperless-gpt
          port: 8080
  tls:
    secretName: legacy-home-wildcard-tls
