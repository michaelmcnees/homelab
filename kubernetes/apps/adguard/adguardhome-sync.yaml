apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome-sync
  namespace: apps
  labels:
    app.kubernetes.io/name: adguardhome-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adguardhome-sync
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguardhome-sync
    spec:
      enableServiceLinks: false
      containers:
        - name: sync
          image: ghcr.io/bakito/adguardhome-sync:v0.7.1
          imagePullPolicy: IfNotPresent
          args:
            - run
          env:
            - name: ORIGIN_URL
              value: "http://adguard-a.apps.svc.cluster.local:80"
            - name: REPLICA1_URL
              value: "http://adguard-b.apps.svc.cluster.local:80"
            - name: CRON
              value: "*/10 * * * *"
            - name: API_PORT
              value: "8080"
            - name: FEATURES_GENERAL_SETTINGS
              value: "true"
            - name: FEATURES_QUERY_LOG_CONFIG
              value: "true"
            - name: FEATURES_STATS_CONFIG
              value: "true"
            - name: FEATURES_CLIENT_SETTINGS
              value: "true"
            - name: FEATURES_SERVICES
              value: "true"
            - name: FEATURES_FILTERS
              value: "true"
            - name: FEATURES_DNS
              value: "true"
            - name: FEATURES_DHCP_SERVER_CONFIG
              value: "false"
            - name: ORIGIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: adguardhome-sync-credentials
                  key: ORIGIN_USERNAME
            - name: ORIGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adguardhome-sync-credentials
                  key: ORIGIN_PASSWORD
            - name: REPLICA1_USERNAME
              valueFrom:
                secretKeyRef:
                  name: adguardhome-sync-credentials
                  key: REPLICA1_USERNAME
            - name: REPLICA1_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adguardhome-sync-credentials
                  key: REPLICA1_PASSWORD
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 60
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adguardhome-sync
  namespace: apps
  labels:
    app.kubernetes.io/name: adguardhome-sync
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: adguardhome-sync
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
