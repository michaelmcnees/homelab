apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: apps
  labels:
    app.kubernetes.io/name: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.14
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: USERMAP_UID
              value: "2000"
            - name: USERMAP_GID
              value: "2000"
            - name: PAPERLESS_URL
              value: https://paperless.home.mcnees.me
            - name: PAPERLESS_ALLOWED_HOSTS
              value: paperless.home.mcnees.me,paperless-ngx,paperless-ngx.apps,paperless-ngx.apps.svc,paperless-ngx.apps.svc.cluster.local
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: https://paperless.home.mcnees.me
            - name: PAPERLESS_TIME_ZONE
              value: America/Detroit
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng
            - name: PAPERLESS_CONSUMER_POLLING
              value: "30"
            - name: PAPERLESS_REDIS
              value: redis://redis-master.databases.svc.cluster.local:6379/2
            - name: PAPERLESS_REDIS_PREFIX
              value: paperless
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_DBHOST
              value: metagross.internal.svc.cluster.local
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_DBUSER
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_DBPASS
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_ADMIN_USER
            - name: PAPERLESS_ADMIN_MAIL
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_ADMIN_MAIL
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secrets
                  key: PAPERLESS_ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: paperless.home.mcnees.me
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: paperless.home.mcnees.me
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume
            - name: export
              mountPath: /usr/src/paperless/export
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: export
          persistentVolumeClaim:
            claimName: paperless-export
