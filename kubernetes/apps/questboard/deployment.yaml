apiVersion: apps/v1
kind: Deployment
metadata:
  name: questboard
  namespace: apps
  labels:
    app.kubernetes.io/name: questboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: questboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: questboard
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: questboard
          image: ghcr.io/thillygooth/questboard:1.12.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8099
              protocol: TCP
          env:
            - name: QUESTBOARD_DATA
              value: /data
          readinessProbe:
            httpGet:
              path: /api/state
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/state
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: questboard-data
