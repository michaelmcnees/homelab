apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-ai-next
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`paperless-ai.home.mcnees.me`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
          namespace: auth
      services:
        - name: paperless-ai-next
          port: 3000
  tls:
    secretName: legacy-home-wildcard-tls
