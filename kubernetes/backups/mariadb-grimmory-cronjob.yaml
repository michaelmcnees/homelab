apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-grimmory-backup
  namespace: apps
  labels:
    app.kubernetes.io/name: backup
    app.kubernetes.io/component: mariadb-grimmory
    homelab.mcnees.me/backup-tag: mariadb-grimmory
spec:
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: ghcr.io/restic/restic:0.17.4
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              command:
                - /bin/sh
                - -ec
                - |
                  set -o pipefail
                  apk add --no-cache mariadb-client > /dev/null

                  mkdir -p /tmp/dump
                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) starting mariadb-dump"
                  mariadb-dump \
                    --host="$MARIADB_HOST" \
                    --port="$MARIADB_PORT" \
                    --user="$MARIADB_USER" \
                    --password="$MARIADB_PASSWORD" \
                    --single-transaction \
                    --routines \
                    --events \
                    --triggers \
                    --all-databases \
                    --result-file=/tmp/dump/grimmory.sql

                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) restic backup"
                  restic backup /tmp/dump \
                    --tag mariadb-grimmory \
                    --tag homelab \
                    --host grimmory

                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) restic forget+prune"
                  restic forget \
                    --tag mariadb-grimmory \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 6 \
                    --prune
              env:
                - name: RESTIC_REPOSITORY
                  value: /mnt/restic
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-password
                      key: RESTIC_PASSWORD
                - name: MARIADB_HOST
                  value: grimmory-mariadb.apps.svc.cluster.local
                - name: MARIADB_PORT
                  value: "3306"
                - name: MARIADB_USER
                  valueFrom:
                    secretKeyRef:
                      name: mariadb-grimmory-backup-credentials
                      key: USERNAME
                - name: MARIADB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mariadb-grimmory-backup-credentials
                      key: PASSWORD
                - name: HOME
                  value: /tmp
                - name: XDG_CACHE_HOME
                  value: /tmp/cache
              volumeMounts:
                - name: restic
                  mountPath: /mnt/restic
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: restic
              nfs:
                server: 10.0.1.1
                path: /mnt/data/backups/restic-homelab
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 2Gi
