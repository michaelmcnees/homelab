apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-restic-backup
  namespace: apps
  labels:
    app.kubernetes.io/name: backup
    app.kubernetes.io/component: paperless
    homelab.mcnees.me/backup-tag: paperless-media
spec:
  schedule: "30 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: restic/restic:0.18.1
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              command:
                - /bin/sh
                - -ec
                - |
                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) restic backup"
                  restic backup \
                    /paperless/media \
                    /paperless/consume \
                    /paperless/export \
                    --tag paperless-media \
                    --tag paperless-consume \
                    --tag paperless-export \
                    --tag homelab \
                    --host paperless

                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) restic forget+prune"
                  restic forget \
                    --tag paperless-media \
                    --tag paperless-consume \
                    --tag paperless-export \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 6 \
                    --prune
              env:
                - name: RESTIC_REPOSITORY
                  value: /mnt/restic
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-password
                      key: RESTIC_PASSWORD
                - name: HOME
                  value: /tmp
                - name: XDG_CACHE_HOME
                  value: /tmp/cache
              volumeMounts:
                - name: paperless-media
                  mountPath: /paperless/media
                  readOnly: true
                - name: paperless-consume
                  mountPath: /paperless/consume
                  readOnly: true
                - name: paperless-export
                  mountPath: /paperless/export
                  readOnly: true
                - name: restic
                  mountPath: /mnt/restic
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: paperless-media
              persistentVolumeClaim:
                claimName: paperless-media
                readOnly: true
            - name: paperless-consume
              persistentVolumeClaim:
                claimName: paperless-consume
                readOnly: true
            - name: paperless-export
              persistentVolumeClaim:
                claimName: paperless-export
                readOnly: true
            - name: restic
              nfs:
                server: 10.0.1.1
                path: /mnt/data/backups/restic-homelab
            - name: tmp
              emptyDir: {}
