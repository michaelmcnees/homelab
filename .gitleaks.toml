[allowlist]
description = "Allowlist false positives"
paths = [
  # Vendored Helm chart templates contain 'kind: Secret' boilerplate — not actual secrets.
  # Scoped to templates/ so values files and other chart content are still scanned.
  '''kubernetes/charts/devtron-operator/templates/.*\.yaml$''',
  # SOPS-encrypted files contain ENC[...] ciphertext — not plaintext secrets
  '''\.sops\.yaml$''',
]
