---
- name: Detect arch
  ansible.builtin.set_fact:
    _hm_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"

# ---- node_exporter ----

- name: Install node_exporter via package manager when available
  block:
    - name: Try apt (Debian/Ubuntu)
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'
      register: _hm_node_pkg
      ignore_errors: true

    - name: Try dnf (Fedora/RHEL)
      ansible.builtin.dnf:
        name: golang-github-prometheus-node-exporter
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
      register: _hm_node_pkg
      ignore_errors: true

    - name: Try pacman (Arch)
      community.general.pacman:
        name: prometheus-node-exporter
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'
      register: _hm_node_pkg
      ignore_errors: true

- name: Fall back to release tarball if no package
  when: _hm_node_pkg is not defined or _hm_node_pkg.failed | default(true)
  block:
    - name: Create node_exporter user
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /sbin/nologin
        create_home: false
        state: present

    - name: Download node_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ host_monitoring_node_exporter_version_linux }}/node_exporter-{{ host_monitoring_node_exporter_version_linux }}.linux-{{ _hm_arch }}.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: "0644"

    - name: Unpack node_exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: /tmp/
        remote_src: true

    - name: Install node_exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ host_monitoring_node_exporter_version_linux }}.linux-{{ _hm_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        owner: root
        group: root
        remote_src: true

    - name: Install node_exporter systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter --web.listen-address={{ host_monitoring_node_exporter_listen }} {{ host_monitoring_node_exporter_collectors_extra | join(' ') }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable + start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

# ---- beszel-agent ----

- name: Create beszel-agent user
  ansible.builtin.user:
    name: beszel
    system: true
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Install beszel-agent via convenience script (idempotent)
  ansible.builtin.shell: |
    set -e
    curl -sL https://get.beszel.dev | bash -s -- agent --hub-url '{{ host_monitoring_beszel_hub_url }}' --key '{{ host_monitoring_beszel_agent_key }}' --port '{{ host_monitoring_beszel_agent_port }}' --noninteractive
  args:
    creates: /usr/local/bin/beszel-agent

- name: Render beszel-agent systemd env override
  ansible.builtin.copy:
    dest: /etc/default/beszel-agent
    mode: "0640"
    owner: root
    group: beszel
    content: |
      KEY={{ host_monitoring_beszel_agent_key }}
      HUB_URL={{ host_monitoring_beszel_hub_url }}
      PORT={{ host_monitoring_beszel_agent_port }}
  notify: restart beszel-agent

- name: Ensure beszel-agent enabled + started
  ansible.builtin.systemd:
    name: beszel-agent
    enabled: true
    state: started
    daemon_reload: true
