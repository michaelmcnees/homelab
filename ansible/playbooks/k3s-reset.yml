---
# Completely removes K3s from all nodes. DESTRUCTIVE — use with caution.
# This will delete all K3s data, pods, and cluster state.
#
# Usage: ansible-playbook playbooks/k3s-reset.yml
#   (intentionally NOT in Taskfile to prevent accidental use)

- name: Reset K3s cluster
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Run K3s uninstall script (server)
      when: "'server' in group_names"
      ansible.builtin.command:
        cmd: k3s-uninstall.sh
        removes: /var/lib/rancher/k3s/*

    - name: Run K3s uninstall script (agent)
      when: "'agent' in group_names"
      ansible.builtin.command:
        cmd: k3s-agent-uninstall.sh
        removes: /var/lib/rancher/k3s/*

    - name: Remove user kubeconfig
      ansible.builtin.file:
        path: "~{{ ansible_user }}/.kube/config"
        state: absent

    - name: Remove k3s install script
      ansible.builtin.file:
        path: /usr/local/bin/k3s-install.sh
        state: absent

    - name: Remove K3s config
      when: server_config_yaml is defined
      ansible.builtin.file:
        path: /etc/rancher/k3s/config.yaml
        state: absent
